<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rocket Through the Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@500;700;800&display=swap" rel="stylesheet">

<style>
  /* ----------------------------------------------------------------
     Design tokens — tweak here to retune the whole scene.
     Chroma is kept low so whites don't read as pastel and the
     overall palette feels like deep space.
  -----------------------------------------------------------------*/
  :root {
    /* Background gradient (deep space) */
    --bg-top:        #05060f;   /* almost black, cool */
    --bg-mid:        #0f0a2a;   /* midnight indigo */
    --bg-bot:        #1a0b36;   /* deep violet */

    /* Accents */
    --star:          #e9ecff;
    --nebula-a:      rgba( 96,  60, 200, 0.35);
    --nebula-b:      rgba(200,  60, 150, 0.22);
    --nebula-c:      rgba( 40, 120, 220, 0.28);

    /* Rocket body */
    --hull:          #eef1f7;
    --hull-shade:    #b7bccb;
    --hull-dark:     #6e7489;
    --window:        #4fd1ff;
    --window-glow:   #a9ecff;
    --fin:           #1a2240;

    /* Exhaust */
    --flame-core:    #fff7d6;
    --flame-hot:     #ffb347;
    --flame-mid:     #ff5a6e;
    --flame-cold:    #7a4bff;

    /* Planet palette (simple, original — not recreating any known planets) */
    --planet-a1:     #6b8bff;
    --planet-a2:     #2a2f7a;
    --planet-b1:     #ff8a5c;
    --planet-b2:     #7a2a38;
    --planet-c1:     #7be0c1;
    --planet-c2:     #174b52;

    /* Motion speeds (seconds) */
    --wobble:        2.6s;
    --flicker:       0.18s;
    --pulse:         1.1s;
    --star-near:     4.0s;
    --star-mid:      8.0s;
    --star-far:     16.0s;

    /* Left HUD spacing — tuned per breakpoint below */
    --hud-left: 22px;
    --hud-top: 18px;
    --hud-level-h: 42px;   /* approx height of level-hud */
    --hud-pu-h: 26px;      /* approx height of a .pu-badge */
    --hud-combo-h: 26px;   /* approx height of .combo-hud */
    --hud-gap: 14px;       /* gap between groups */
    --hud-stack: 2px;      /* gap between items within a group */
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #000;
    color: var(--star);
    overflow: hidden;
    /* Prevent scroll/zoom/gesture eating our touch input */
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Stage fills the viewport and clips all motion layers */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    /* Deep space vertical gradient with a soft purple "core" glow */
    background:
      radial-gradient(ellipse 80% 55% at 50% 60%,
        rgba(120, 70, 220, 0.18) 0%,
        rgba(120, 70, 220, 0.00) 60%),
      linear-gradient(180deg,
        var(--bg-top) 0%,
        var(--bg-mid) 55%,
        var(--bg-bot) 100%);
    isolation: isolate;
  }

  /* ----------------------------------------------------------------
     Nebulae — soft blurred blobs drifting slowly for depth.
  -----------------------------------------------------------------*/
  .nebula {
    position: absolute;
    width: 60vmax; height: 60vmax;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.9;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .nebula.a {
    left: -15vmax; top: 10vh;
    background: radial-gradient(circle at 40% 40%, var(--nebula-a), transparent 60%);
    animation: drift-a 40s ease-in-out infinite alternate;
  }
  .nebula.b {
    right: -20vmax; top: 40vh;
    background: radial-gradient(circle at 50% 50%, var(--nebula-b), transparent 60%);
    animation: drift-b 55s ease-in-out infinite alternate;
  }
  .nebula.c {
    left: 30%; top: -20vmax;
    background: radial-gradient(circle at 50% 50%, var(--nebula-c), transparent 60%);
    animation: drift-c 70s ease-in-out infinite alternate;
  }
  @keyframes drift-a { to { transform: translate(8vw,  6vh) scale(1.1); } }
  @keyframes drift-b { to { transform: translate(-6vw, -4vh) scale(0.95); } }
  @keyframes drift-c { to { transform: translate(4vw,  10vh) scale(1.05); } }

  /* ----------------------------------------------------------------
     Starfield layers — three <canvas> elements stacked & scrolling
     at different speeds for parallax. Canvas lets us draw hundreds
     of stars cheaply; CSS keyframes do the actual motion.
  -----------------------------------------------------------------*/
  .stars {
    position: absolute;
    left: 0; right: 0;
    /* Each layer is drawn twice-tall and looped via translateY. */
    top: -100%;
    width: 100%;
    height: 200%;
    will-change: transform;
    pointer-events: none;
  }
  .stars.far  { animation: scroll-stars var(--star-far)  linear infinite; opacity: 0.55; }
  .stars.mid  { animation: scroll-stars var(--star-mid)  linear infinite; opacity: 0.80; }
  .stars.near { animation: scroll-stars var(--star-near) linear infinite; opacity: 1.00; }

  @keyframes scroll-stars {
    from { transform: translateY(0); }
    to   { transform: translateY(50%); } /* canvas is 2× tall → 50% = one screen */
  }

  /* Subtle twinkle overlay (CSS-only, doesn't need per-star JS) */
  .twinkle {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.2px 1.2px at 12% 22%, #fff, transparent 60%),
      radial-gradient(1.4px 1.4px at 78% 64%, #fff, transparent 60%),
      radial-gradient(1.0px 1.0px at 44% 82%, #fff, transparent 60%),
      radial-gradient(1.6px 1.6px at 88% 14%, #fff, transparent 60%),
      radial-gradient(1.2px 1.2px at 30% 56%, #fff, transparent 60%);
    animation: twinkle 3.2s ease-in-out infinite alternate;
    pointer-events: none;
    opacity: 0.7;
  }
  @keyframes twinkle {
    from { opacity: 0.2; }
    to   { opacity: 0.9; }
  }

  /* ----------------------------------------------------------------
     Passing planets — slow diagonal drift across the screen.
     Shapes are SVG <circle>s with radial gradients; nothing complex.
  -----------------------------------------------------------------*/
  .planet {
    position: absolute;
    width: 240px; height: 240px;
    will-change: transform;
    pointer-events: none;
    filter: drop-shadow(0 0 30px rgba(120,120,255,0.25));
  }
  .planet.one {
    top: 18%;
    animation: pass-planet-1 28s linear infinite;
  }
  .planet.two {
    top: 62%;
    width: 160px; height: 160px;
    animation: pass-planet-2 38s linear infinite;
    animation-delay: -14s;
  }
  .planet.three {
    top: 8%;
    width: 110px; height: 110px;
    animation: pass-planet-3 22s linear infinite;
    animation-delay: -8s;
  }
  /* Keep planets fully off-screen at the endpoints so the loop is seamless */
  @keyframes pass-planet-1 {
    from { transform: translate(110vw, -4vh); }
    to   { transform: translate(-40vw, 14vh); }
  }
  @keyframes pass-planet-2 {
    from { transform: translate(115vw, 6vh); }
    to   { transform: translate(-35vw, -10vh); }
  }
  @keyframes pass-planet-3 {
    from { transform: translate(110vw, 0); }
    to   { transform: translate(-30vw, 6vh); }
  }

  /* ----------------------------------------------------------------
     Asteroids — tiny rocks streaking by (pure CSS)
  -----------------------------------------------------------------*/
  .asteroid {
    position: absolute;
    width: 10px; height: 7px;
    background: #9aa0b4;
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    box-shadow:
      inset -2px -1px 0 rgba(0,0,0,0.35),
      0 0 6px rgba(255,180,120,0.25);
    will-change: transform;
    opacity: 0.9;
  }
  .asteroid.a { top: 30%; animation: fly-rock 9s linear infinite; }
  .asteroid.b { top: 70%; width: 6px; height: 5px;
                animation: fly-rock 13s linear infinite; animation-delay: -5s; }
  .asteroid.c { top: 48%; width: 14px; height: 9px;
                animation: fly-rock 18s linear infinite; animation-delay: -11s; opacity: 0.7; }
  @keyframes fly-rock {
    from { transform: translate(110vw, 0)  rotate(0deg); }
    to   { transform: translate(-20vw, 8vh) rotate(540deg); }
  }

  /* ----------------------------------------------------------------
     The rocket — SVG, centered, with layered wobble/vibration.
     Two nested wrappers so wobble (slow sway) and vibe (fast jitter)
     don't fight each other.
  -----------------------------------------------------------------*/
  .rocket-wrap {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(110px, 9vw);
    aspect-ratio: 1 / 2.2;
    will-change: transform;
  }
  /* Outer pilot layer — driven by JS based on keyboard input.
     Lives above .wobble/.vibe so flight motion and idle jitter compose. */
  .pilot {
    width: 100%; height: 100%;
    will-change: transform;
  }
  .wobble {
    width: 100%; height: 100%;
    animation: wobble var(--wobble) ease-in-out infinite alternate;
    transform-origin: 50% 60%;
  }
  .vibe {
    width: 100%; height: 100%;
    animation: vibe 0.09s steps(2) infinite;
  }
  @keyframes wobble {
    0%   { transform: translateY(-4px) rotate(-1.6deg); }
    50%  { transform: translateY( 3px) rotate( 0.4deg); }
    100% { transform: translateY(-2px) rotate( 1.6deg); }
  }
  @keyframes vibe {
    0%   { transform: translate(-0.4px, 0); }
    50%  { transform: translate( 0.4px, 0.3px); }
    100% { transform: translate( 0,    -0.3px); }
  }

  .rocket-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.55))
            drop-shadow(0 0 18px rgba(120, 160, 255, 0.15));
    overflow: visible;
  }

  /* Window interior glow — gentle pulse */
  .window-glow {
    transform-origin: center;
    animation: win-pulse 3.4s ease-in-out infinite alternate;
  }
  @keyframes win-pulse {
    from { opacity: 0.75; }
    to   { opacity: 1.0; }
  }

  /* ----------------------------------------------------------------
     Exhaust flames — stacked shapes with flicker/pulse.
     Three layers: cold outer, hot middle, white-hot core.
  -----------------------------------------------------------------*/
  .flame {
    transform-origin: 50% 0%;
    mix-blend-mode: screen;
  }
  .flame.outer  { animation: flame-outer var(--pulse) ease-in-out infinite; }
  .flame.middle { animation: flame-mid   calc(var(--pulse) * 0.7) ease-in-out infinite; }
  .flame.core   { animation: flame-core  var(--flicker) steps(2) infinite; }

  @keyframes flame-outer {
    0%,100% { transform: scaleY(1.00) scaleX(1.00); opacity: 0.75; }
    50%     { transform: scaleY(1.18) scaleX(0.92); opacity: 0.95; }
  }
  @keyframes flame-mid {
    0%,100% { transform: scaleY(0.95) scaleX(1.05); opacity: 0.85; }
    50%     { transform: scaleY(1.20) scaleX(0.90); opacity: 1.00; }
  }
  @keyframes flame-core {
    0%   { transform: scaleY(1.00) scaleX(1.00); opacity: 1.0; }
    100% { transform: scaleY(1.12) scaleX(0.94); opacity: 0.85; }
  }

  /* Embers streaming behind the rocket */
  .embers {
    position: absolute;
    left: 50%;
    top: calc(50% + min(55px, 4.5vw));
    transform: translateX(-50%);
    width: min(60px, 5vw);
    height: 30vh;
    pointer-events: none;
    overflow: visible;
  }
  .ember {
    position: absolute;
    left: 50%;
    top: 0;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--flame-hot);
    box-shadow: 0 0 8px var(--flame-hot), 0 0 16px var(--flame-mid);
    animation: ember-fall 1.6s linear infinite;
    opacity: 0;
  }
  @keyframes ember-fall {
    0%   { transform: translate(-50%, 0)    scale(1);   opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--drift, 0px)), 40vh) scale(0.2); opacity: 0; }
  }

  /* ----------------------------------------------------------------
     Lasers — neon bolts streaming upward from the rocket nose.
  -----------------------------------------------------------------*/
  .lasers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .laser {
    position: absolute;
    width: 4px;
    height: 22px;
    border-radius: 2px;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0%,
      #a9ecff 20%,
      #4fd1ff 50%,
      #7a4bff 100%
    );
    box-shadow:
      0 0 6px #4fd1ff,
      0 0 14px #4fd1ff,
      0 0 24px rgba(122, 75, 255, 0.8);
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
  }
  .laser::after {
    /* Soft halo head */
    content: "";
    position: absolute;
    left: 50%; top: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(79,209,255,0.5) 40%, transparent 70%);
    transform: translate(-50%, -50%);
  }

  /* ----------------------------------------------------------------
     UFOs, particles, score, game-over
  -----------------------------------------------------------------*/
  .ufos, .fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .ufo {
    position: absolute;
    will-change: transform, left, top;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
            drop-shadow(0 0 14px rgba(120, 220, 255, 0.25));
    transition: filter 0.08s;
  }
  .ufo svg { width: 100%; height: 100%; display: block; }
  .ufo.flash { filter: drop-shadow(0 0 12px #fff) brightness(2.2); }

  .particle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    mix-blend-mode: screen;
  }
  .particle.warm {
    background: #fff7d6;
    box-shadow: 0 0 8px #ffb347, 0 0 16px #ff5a6e;
  }
  .particle.cool {
    background: #a9ecff;
    box-shadow: 0 0 8px #4fd1ff, 0 0 16px #7a4bff;
  }

  .score {
    position: absolute;
    top: 18px; right: 22px;
    z-index: 6;
    padding: 14px 14px 10px;
    border-radius: 10px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    color: #e9ecff;
    font: 600 14px/1 "Noto Sans Georgian","Sylfaen",ui-monospace,SFMono-Regular,Menlo,monospace;
    letter-spacing: 0.08em;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 10px;
    line-height: 1;
  }
  .score > * { display: flex; align-items: center; }
  .score .score-label { font-size: 12px; opacity: 0.85; }
  .score #score { font-size: 18px; font-weight: 800; line-height: 1; }
  .score .coin { width: 20px; height: 20px; }
  .score .coin svg { width: 100%; height: 100%; display: block; }
  .score .coin {
    width: 22px; height: 22px;
    display: inline-block;
    filter: drop-shadow(0 0 6px rgba(255,196,61,0.55));
    animation: coin-spin 2.4s ease-in-out infinite;
    transform-origin: center;
  }
  .score .coin svg { width: 100%; height: 100%; display: block; }
  @keyframes coin-spin {
    0%,100% { transform: rotateY(0deg); }
    50%     { transform: rotateY(180deg); }
  }
  .score-label { opacity: 0.6; font-size: 11px; align-self: baseline; }
  .score #score {
    font-size: 20px;
    font-weight: 800;
    color: #ffd76a;
    text-shadow: 0 0 10px rgba(255,196,61,0.45);
    min-width: 1.5ch;
    text-align: right;
    transition: transform 0.15s;
  }
  .score #score.bump { transform: scale(1.35); }

  .coin-flyer {
    position: absolute;
    width: 22px; height: 22px;
    pointer-events: none;
    z-index: 15;
    filter: drop-shadow(0 0 8px rgba(255,196,61,0.8))
            drop-shadow(0 0 16px rgba(255,140,60,0.6));
    transform: translate(0,0);
    will-change: transform, opacity;
  }
  .coin-flyer svg { width: 100%; height: 100%; display: block; }

  .rocket-wrap.destroyed { opacity: 0; transition: opacity 0.12s; }

  .game-over {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    background: radial-gradient(ellipse at center, rgba(30,0,0,0.55), rgba(0,0,0,0.0) 70%);
  }
  .game-over.show { opacity: 1; }
  /* Victory overlay needs to accept clicks on its buttons. */
  #victoryScreen.show { pointer-events: auto; }

  /* Victory action buttons — continue / restart */
  .victory-actions {
    margin-top: clamp(24px, 4vw, 48px);
    display: flex;
    gap: clamp(12px, 2vw, 24px);
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: auto;
  }
  .victory-btn {
    padding: 14px 28px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    font: 800 clamp(16px, 1.8vw, 22px)/1 "Noto Sans Georgian", "Sylfaen", sans-serif;
    letter-spacing: 0.06em;
    color: #fff;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: transform 0.1s ease, filter 0.15s ease, box-shadow 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    pointer-events: auto;
    /* Buttons sit on a body with touch-action:none, which suppresses
       the synthetic click on some mobile browsers. Re-enable tap-only
       gestures so clicks fire reliably. */
    touch-action: manipulation;
    position: relative;
    z-index: 1;
  }
  .victory-btn.continue {
    background: linear-gradient(135deg, rgba(80,220,140,0.85), rgba(40,140,90,0.9));
    border-color: rgba(150, 255, 180, 0.7);
    box-shadow: 0 0 18px rgba(80,220,140,0.55), 0 6px 16px rgba(0,0,0,0.35);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .victory-btn.restart {
    background: linear-gradient(135deg, rgba(255,170,90,0.85), rgba(200,60,70,0.9));
    border-color: rgba(255, 200, 150, 0.7);
    box-shadow: 0 0 18px rgba(255,130,80,0.55), 0 6px 16px rgba(0,0,0,0.35);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .victory-btn:hover { filter: brightness(1.15); transform: translateY(-2px); }
  .victory-btn:active { transform: translateY(1px) scale(0.97); }
  @media (pointer: coarse) and (max-width: 520px) {
    .victory-btn { padding: 12px 20px; }
  }
  .go-text {
    font: 800 clamp(40px, 7.5vw, 104px)/1.05 "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen", "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: 0.03em;
    color: #fff;
    text-align: center;
    max-width: 92vw;
    text-shadow:
      0 0 18px rgba(255, 90, 110, 0.9),
      0 0 42px rgba(255, 90, 110, 0.5),
      0 4px 0 #8b0018;
    transform: translateY(0);
    animation: go-pop 0.5s cubic-bezier(.2,1.4,.5,1) both;
  }
  .go-sub {
    margin-top: 14px;
    color: rgba(233,236,255,0.85);
    font: 600 clamp(16px, 1.6vw, 22px)/1 "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen", sans-serif;
    letter-spacing: 0.08em;
  }
  @keyframes go-pop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1.0); opacity: 1; }
  }

  /* ----------------------------------------------------------------
     Keyboard hint overlay
  -----------------------------------------------------------------*/
  .hint {
    position: absolute;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(10, 8, 30, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 180, 255, 0.18);
    color: rgba(233, 236, 255, 0.85);
    font-family: "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen",
                 ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    user-select: none;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 5;
  }
  .hint.fade { opacity: 0; }
  .hint-row { display: flex; align-items: center; gap: 6px; }
  .hint-row span { margin: 0 4px; opacity: 0.7; }
  .hint kbd {
    display: inline-block;
    min-width: 22px;
    padding: 3px 6px;
    font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.22);
    border-bottom-width: 2px;
    border-radius: 5px;
  }

  /* ----------------------------------------------------------------
     Mobile touch controls — joystick + fire button.
     Hidden on desktop; revealed on coarse (touch) pointers OR narrow screens.
  -----------------------------------------------------------------*/
  .touch {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8;
    display: none;
  }
  .stick {
    /* Full-screen invisible capture surface — the user swipes anywhere
       to steer. A floating origin (set on pointerdown) means the touch
       point itself becomes the joystick center. */
    position: absolute;
    inset: 0;
    width: auto; height: auto;
    pointer-events: auto;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    background: transparent;
  }
  /* While the victory screen is visible, the stick must NOT
     capture touches — they need to reach the buttons. */
  body.victory-showing .stick { pointer-events: none; }
  .stick-ring, .stick-knob { display: none; }
  .stick-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 45%,
      rgba(30, 24, 60, 0.55),
      rgba(10, 8, 30, 0.65));
    border: 1.5px solid rgba(180, 180, 255, 0.28);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:
      inset 0 0 30px rgba(122, 75, 255, 0.18),
      0 4px 20px rgba(0, 0, 0, 0.35);
  }
  .stick-ring::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 70%; height: 70%;
    transform: translate(-50%, -50%);
    background:
      linear-gradient(to right, transparent 49%, rgba(255,255,255,0.12) 49% 51%, transparent 51%),
      linear-gradient(to bottom, transparent 49%, rgba(255,255,255,0.12) 49% 51%, transparent 51%);
    border-radius: 50%;
    pointer-events: none;
  }
  .stick-knob {
    position: absolute;
    left: 50%; top: 50%;
    width: 58px; height: 58px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 30%, #e9ecff 0%, #a9ecff 35%, #4fd1ff 75%, #3a86b8 100%);
    border: 2px solid rgba(255, 255, 255, 0.55);
    box-shadow:
      0 6px 14px rgba(0, 0, 0, 0.5),
      0 0 14px rgba(79, 209, 255, 0.55);
    transition: transform 0.12s ease-out;
    will-change: transform;
  }
  .stick.active .stick-knob { transition: none; }

  .fire-btn {
    position: absolute;
    right: 24px;
    bottom: calc(42px + env(safe-area-inset-bottom, 0px));
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 2px solid rgba(255, 180, 100, 0.55);
    background: radial-gradient(circle at 35% 30%,
      #ffd890 0%, #ff8a5c 45%, #d63d4a 90%);
    box-shadow:
      0 0 22px rgba(255, 120, 80, 0.55),
      0 8px 22px rgba(0, 0, 0, 0.45),
      inset 0 -6px 12px rgba(0, 0, 0, 0.2);
    pointer-events: auto;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 0;
    display: grid;
    place-items: center;
    color: #fff;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  .fire-btn:active,
  .fire-btn.pressed { transform: scale(0.92); filter: brightness(1.15); }
  .fire-btn svg { width: 42%; height: 42%; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }

  /* Show touch UI on devices that need it */
  @media (pointer: coarse), (max-width: 820px) {
    .touch { display: block; }
  }
  /* Keyboard-only hint — hidden entirely on any touch device */
  @media (pointer: coarse) {
    .hint { display: none !important; }
  }
  @media (pointer: coarse) and (max-width: 520px) {
    .score { top: calc(12px + env(safe-area-inset-top, 0px)); right: 14px; padding: 6px 10px; }
    .score-label { font-size: 10px; }
    .score #score { font-size: 16px; }
    .fire-btn { width: 78px; height: 78px; right: 18px; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); }
  }

  /* ----------------------------------------------------------------
     Falling coin pickups + coin flyer
  -----------------------------------------------------------------*/
  .pickups { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
  .pickup {
    position: absolute;
    width: 34px; height: 34px;
    will-change: transform, left, top;
    filter: drop-shadow(0 0 10px rgba(255, 200, 80, 0.7))
            drop-shadow(0 0 22px rgba(255, 140, 40, 0.35));
    animation: coin-spin 1.2s linear infinite, coin-bob 1.6s ease-in-out infinite alternate;
  }
  .pickup svg { width: 100%; height: 100%; display: block; }
  @keyframes coin-spin {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes coin-bob {
    from { filter: drop-shadow(0 0 8px rgba(255,200,80,0.5)); }
    to   { filter: drop-shadow(0 0 16px rgba(255,220,120,0.95))
                   drop-shadow(0 0 30px rgba(255,140,40,0.55)); }
  }

  .coin-flyer {
    position: absolute;
    width: 22px; height: 22px;
    pointer-events: none;
    z-index: 7;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255, 200, 80, 0.85));
  }
  .coin-flyer svg { width: 100%; height: 100%; display: block; }

  /* Score bump when coins land */
  #score { transition: transform 0.18s cubic-bezier(.2,1.4,.5,1), color 0.2s; }
  #score.bump {
    transform: scale(1.35);
    color: #ffd76a;
    text-shadow: 0 0 10px rgba(255, 215, 106, 0.8);
  }

  /* ----------------------------------------------------------------
     Power-ups — shared bob + blinking halo, per-kind glow color
  -----------------------------------------------------------------*/
  .powerup {
    position: absolute;
    width: 46px; height: 46px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    --pu-glow: 120, 200, 255;
    filter:
      drop-shadow(0 0 10px rgba(var(--pu-glow), 1))
      drop-shadow(0 0 24px rgba(var(--pu-glow), 0.75))
      drop-shadow(0 0 42px rgba(var(--pu-glow), 0.45));
    animation:
      pu-bob 1.4s ease-in-out infinite alternate,
      pu-blink 0.7s ease-in-out infinite alternate;
  }
  .powerup::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(var(--pu-glow), 0.65) 0%,
      rgba(var(--pu-glow), 0.30) 40%,
      rgba(var(--pu-glow), 0.0)  72%);
    z-index: -1;
    animation: pu-halo 0.8s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .powerup.shield { --pu-glow: 120, 200, 255; }
  .powerup.double { --pu-glow: 255, 170,  90; }
  .powerup.bomb   { --pu-glow: 255, 110, 110; }
  .powerup.magnet { --pu-glow: 255,  90, 170; }
  .powerup.heal   { --pu-glow: 130, 240, 150; }
  .powerup.slow   { --pu-glow: 170, 220, 255; }

  .powerup svg { width: 100%; height: 100%; display: block; }
  @keyframes pu-bob {
    from { transform: translate(-50%, -50%) rotate(-4deg); }
    to   { transform: translate(-50%, -40%) rotate(4deg); }
  }
  @keyframes pu-blink {
    0%,100% { opacity: 0.75; }
    50%     { opacity: 1.0; }
  }
  @keyframes pu-halo {
    0%,100% { opacity: 0.45; transform: scale(0.82); }
    50%     { opacity: 1.0;  transform: scale(1.25); }
  }
  .powerups { position: absolute; inset: 0; pointer-events: none; z-index: 4; }

  /* Active shield halo around rocket */
  .shield-halo {
    position: absolute;
    left: 0; top: 0;
    width: 180px; height: 180px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    background:
      radial-gradient(circle,
        rgba(120,200,255,0.0) 54%,
        rgba(120,200,255,0.18) 62%,
        rgba(120,200,255,0.45) 75%,
        rgba(80,160,255,0.0) 100%);
    box-shadow:
      inset 0 0 30px rgba(180, 220, 255, 0.55),
      0 0 24px rgba(120, 200, 255, 0.55);
    animation: shield-pulse 2.2s ease-in-out infinite;
  }
  @keyframes shield-pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1.0);   opacity: 1; }
    50%     { transform: translate(-50%, -50%) scale(1.08);  opacity: 0.75; }
  }

  /* Shield timer (top-center of rocket) */
  .shield-timer {
    position: absolute;
    left: 0; top: 0;
    width: 64px; height: 64px;
    transform: translate(-50%, calc(-50% - 110px));
    pointer-events: none;
    z-index: 9;
  }
  .shield-timer svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .shield-timer .ring-bg   { fill: none; stroke: rgba(10,10,30,0.55); stroke-width: 5; }
  .shield-timer .ring-fg   { fill: none; stroke: #7be0ff; stroke-width: 5; stroke-linecap: round;
                             filter: drop-shadow(0 0 6px rgba(120,220,255,0.9)); }
  .shield-timer .num {
    position: absolute; inset: 0; display: grid; place-items: center;
    font: 800 16px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    color: #eaf6ff;
    text-shadow: 0 0 8px rgba(80,180,255,0.9);
  }

  /* Left-edge HUD: one wrapper anchored below the round indicator. Inside
     it, the powerup group sits on top and the multiplier group below, with
     the same gap between round↔powerups and powerups↔multipliers.
     All offsets come from CSS vars so breakpoints below retune spacing. */
  .hud-left-wrap {
    position: absolute;
    top: calc(var(--hud-top) + var(--hud-level-h) + var(--hud-gap));
    left: var(--hud-left);
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--hud-gap);    /* between powerup group and multiplier group */
    pointer-events: none;
  }
  .hud-stack-left,
  .hud-stack-mult {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: var(--hud-stack);  /* intra-group spacing between stacked badges */
  }

  /* Active double-shot badge (now part of the left-hand stack) */
  .ds-badge {
    z-index: 6;
    padding: 6px 10px 13px;
    border-radius: 10px;
    background: rgba(40, 10, 30, 0.55);
    border: 1px solid rgba(255, 160, 90, 0.4);
    color: #ffdba6;
    font: 700 11px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    position: relative;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .ds-badge.on { display: inline-flex; }

  /* Shared countdown bar inside timed powerup badges */
  .pu-timebar {
    position: absolute;
    left: 6px; right: 6px; bottom: 3px;
    height: 5px;
    background: rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 3px;
    overflow: hidden;
  }
  .pu-timebar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 100%;
    border-radius: 2px;
    transition: width 0.1s linear;
  }
  /* Per-kind bar colors so the fill contrasts strongly with the dark track */
  .ds-badge .pu-timebar-fill       { background: linear-gradient(to right, #ffd76a, #ff8a3d); box-shadow: 0 0 6px #ff8a3d; }
  .pu-badge.shield .pu-timebar-fill { background: linear-gradient(to right, #c6eeff, #4fa8ff); box-shadow: 0 0 6px #4fa8ff; }
  .pu-badge.magnet .pu-timebar-fill { background: linear-gradient(to right, #ffb0d8, #ff5aa0); box-shadow: 0 0 6px #ff5aa0; }
  .pu-badge.slow   .pu-timebar-fill { background: linear-gradient(to right, #d6ecff, #6ab8ff); box-shadow: 0 0 6px #6ab8ff; }

  /* Generic powerup badges (magnet, slow) stacked below the level HUD */
  .pu-badge {
    position: relative;
    z-index: 6;
    padding: 6px 10px 13px;
    border-radius: 10px;
    background: rgba(10, 8, 30, 0.55);
    border: 1px solid rgba(180, 180, 255, 0.22);
    color: #eaf6ff;
    font: 700 11px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .pu-badge.on { display: inline-flex; }
  .pu-badge.shield {
    border-color: rgba(120, 200, 255, 0.55);
    color: #d6f0ff;
    box-shadow: 0 0 12px rgba(80, 170, 255, 0.4);
  }
  .pu-badge.magnet {
    border-color: rgba(255, 130, 200, 0.55);
    color: #ffd6ec;
    box-shadow: 0 0 12px rgba(255, 90, 170, 0.35);
  }
  .pu-badge.slow {
    border-color: rgba(170, 220, 255, 0.55);
    color: #d6ecff;
    box-shadow: 0 0 12px rgba(120, 180, 240, 0.35);
  }

  /* Combo + coin-streak counters */
  .combo-hud {
    position: relative;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(40, 14, 6, 0.6);
    border: 1px solid rgba(255, 170, 60, 0.45);
    color: #ffe0a8;
    font: 800 12px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .combo-hud.on { display: inline-flex; }
  .combo-hud.active {
    background: rgba(80, 20, 8, 0.72);
    border-color: rgba(255, 180, 70, 0.95);
    color: #fff2c0;
    animation: combo-pulse 0.55s ease-in-out infinite alternate;
  }
  @keyframes combo-pulse {
    from { filter: brightness(1)   drop-shadow(0 0 6px  rgba(255,170,60,0.55)); }
    to   { filter: brightness(1.3) drop-shadow(0 0 16px rgba(255,170,60,0.95)); }
  }
  .streak-hud {
    position: relative;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(40, 30, 6, 0.55);
    border: 1px solid rgba(255, 210, 90, 0.45);
    color: #fff0b8;
    font: 800 12px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .streak-hud.on { display: inline-flex; }
  .streak-hud .streak-coin {
    width: 16px; height: 16px;
    display: inline-flex;
    filter: drop-shadow(0 0 4px rgba(255,196,61,0.6));
  }
  .streak-hud .streak-coin svg { width: 100%; height: 100%; display: block; }

  /* Centered bonus banner (combo/streak rewards) */
  .bonus-banner {
    position: absolute;
    left: 50%; top: 32%;
    transform: translate(-50%, -50%) scale(0.8);
    z-index: 17;
    pointer-events: none;
    opacity: 0;
    font: 800 clamp(24px, 4vw, 48px)/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.04em;
    color: #fff4c8;
    text-shadow:
      0 0 16px rgba(255, 180, 60, 0.9),
      0 0 32px rgba(255, 120, 40, 0.7),
      0 3px 0 rgba(40, 10, 0, 0.7);
    white-space: nowrap;
  }
  .bonus-banner.show {
    animation: bonus-pop 1.2s cubic-bezier(.2,1.4,.5,1) forwards;
  }
  @keyframes bonus-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    60%  { opacity: 1; transform: translate(-50%, -60%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(0.95); }
  }

    /* ----------------------------------------------------------------
     Shockwave rings + fullscreen flash + screen shake (player death)
  -----------------------------------------------------------------*/
  .shockwave {
    position: absolute;
    width: 20px; height: 20px;
    margin-left: -10px; margin-top: -10px;
    border-radius: 50%;
    border: 4px solid rgba(255, 200, 140, 0.9);
    box-shadow:
      0 0 30px rgba(255, 160, 80, 0.8),
      inset 0 0 20px rgba(255, 220, 180, 0.5);
    pointer-events: none;
    animation: shockwave-grow 1.1s cubic-bezier(.1,.7,.3,1) forwards;
    mix-blend-mode: screen;
  }
  .shockwave.slow {
    border-color: rgba(180, 220, 255, 0.8);
    box-shadow: 0 0 40px rgba(120,160,255,0.7), inset 0 0 30px rgba(180,210,255,0.45);
    animation-duration: 1.5s;
  }
  @keyframes shockwave-grow {
    0%   { transform: scale(0.3); opacity: 1; border-width: 6px; }
    70%  { opacity: 0.6; border-width: 2px; }
    100% { transform: scale(30); opacity: 0; border-width: 0.5px; }
  }
  .bigflash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,240,210,0.9), rgba(255,200,150,0.3) 40%, transparent 70%);
    pointer-events: none;
    animation: bigflash 0.7s ease-out forwards;
    mix-blend-mode: screen;
  }
  @keyframes bigflash {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .stage.shake { animation: shake 0.9s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    10%     { transform: translate(-8px, 4px); }
    20%     { transform: translate(9px, -6px); }
    30%     { transform: translate(-12px, -5px); }
    40%     { transform: translate(7px, 8px); }
    50%     { transform: translate(-5px, -7px); }
    60%     { transform: translate(6px, 5px); }
    70%     { transform: translate(-4px, 3px); }
    80%     { transform: translate(3px, -2px); }
    90%     { transform: translate(-1px, 1px); }
  }

  /* ----------------------------------------------------------------
     Life meter (right side, vertical)
  -----------------------------------------------------------------*/
  .life-meter {
    position: absolute;
    right: 22px;
    top: 72px;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 8px;
    border-radius: 12px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    user-select: none;
  }
  .life-label {
    font: 700 10px/1 ui-monospace, Menlo, monospace;
    letter-spacing: 0.12em;
    color: rgba(233,236,255,0.6);
  }
  .life-bar {
    width: 16px; height: 140px;
    position: relative;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .life-fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, #22d37a 0%, #7bf0a0 55%, #d8ff8a 100%);
    box-shadow: 0 0 12px rgba(120, 240, 160, 0.6), inset 0 0 8px rgba(255,255,255,0.25);
    transition: height 0.25s ease-out, background 0.3s, box-shadow 0.3s;
    height: 100%;
  }
  .life-fill.med {
    background: linear-gradient(to top, #d89a1a 0%, #ffd34b 60%, #fff2a0 100%);
    box-shadow: 0 0 12px rgba(255,200,80,0.6), inset 0 0 8px rgba(255,255,255,0.25);
  }
  .life-fill.low {
    background: linear-gradient(to top, #d63d4a 0%, #ff7a6a 70%, #ffd0c0 100%);
    box-shadow: 0 0 14px rgba(255,90,90,0.8), inset 0 0 8px rgba(255,255,255,0.25);
    animation: life-pulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes life-pulse {
    from { filter: brightness(0.8); }
    to   { filter: brightness(1.35); }
  }
  .life-ticks {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        transparent calc(100% / 5 - 1px), rgba(0,0,0,0.4) calc(100% / 5),
        transparent calc(100% / 5 + 1px), transparent calc(200% / 5 - 1px),
        rgba(0,0,0,0.4) calc(200% / 5), transparent calc(200% / 5 + 1px),
        transparent calc(300% / 5 - 1px), rgba(0,0,0,0.4) calc(300% / 5),
        transparent calc(300% / 5 + 1px), transparent calc(400% / 5 - 1px),
        rgba(0,0,0,0.4) calc(400% / 5), transparent calc(400% / 5 + 1px));
    pointer-events: none;
  }
  .life-icon { font-size: 14px; line-height: 1; }
  @media (pointer: coarse) and (max-width: 520px) {
    .life-meter { right: 14px; top: 60px; padding: 8px 6px; }
    .life-bar   { width: 12px; height: 110px; }
  }

  /* ----------------------------------------------------------------
     Rocket hit-flash overlay
  -----------------------------------------------------------------*/
  .rocket-wrap.hit-flash { filter: drop-shadow(0 0 18px #ff5a6e) brightness(1.8); }

  /* ----------------------------------------------------------------
     Enemy red bolts (from gun UFOs)
  -----------------------------------------------------------------*/
  .enemy-bolt {
    position: absolute;
    width: 5px;
    height: 18px;
    border-radius: 2px;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0%,
      #ffdccc 15%,
      #ff5a6e 50%,
      #8b0018 100%
    );
    box-shadow:
      0 0 6px #ff5a6e,
      0 0 14px #ff5a6e,
      0 0 22px rgba(200, 40, 60, 0.8);
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    pointer-events: none;
  }
  .enemy-bolt::after {
    content: "";
    position: absolute;
    left: 50%; top: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,200,0.9), rgba(255,90,110,0.5) 40%, transparent 70%);
    transform: translate(-50%, -50%);
  }
  .enemy-bolts { position: absolute; inset: 0; pointer-events: none; z-index: 4; }

  /* Gun-UFO variant gets a red tinted drop shadow */
  .ufo.gun { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
                    drop-shadow(0 0 16px rgba(255, 90, 110, 0.55)); }

  /* Sine-wave UFO variant gets a purple tinted drop shadow */
  .ufo.sine { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
                     drop-shadow(0 0 16px rgba(180, 120, 255, 0.55)); }

  /* Splitter UFO variant — green glow; spawns 2 mini-splitters on death */
  .ufo.splitter { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
                          drop-shadow(0 0 16px rgba(130, 240, 150, 0.75)); }

  /* Damaging hazards layer (rocks, comets, comet warnings) */
  .hazards { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
  .hazard-rock {
    position: absolute;
    will-change: transform, left, top;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6))
            drop-shadow(0 0 8px rgba(200, 150, 100, 0.3));
  }
  .hazard-rock svg { width: 100%; height: 100%; display: block; }
  @keyframes comet-warn-blink {
    0%,100% { opacity: 0.3; }
    50%     { opacity: 1.0; }
  }

  /* ----------------------------------------------------------------
     Level HUD + round-change banner
  -----------------------------------------------------------------*/
  .level-hud {
    position: absolute;
    top: var(--hud-top); left: var(--hud-left);
    z-index: 6;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    color: #e9ecff;
    font-family: "Noto Sans Georgian", "Sylfaen", ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: baseline; gap: 10px;
  }
  .level-hud .level-label { opacity: 0.55; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .level-hud #level {
    font-size: 18px;
    font-weight: 800;
    color: #a9ecff;
    text-shadow: 0 0 10px rgba(79,209,255,0.45);
  }
  .level-hud #level.infinity {
    font-size: 26px;
    line-height: 1;
    letter-spacing: 0;
  }
  @media (pointer: coarse) and (max-width: 520px) {
    .level-hud #level.infinity { font-size: 20px; }
  }

  /* Responsive left-HUD overrides — purely :root variable tweaks so every
     piece of the stack (round, powerups, multipliers) rescales together. */
  /* Tablet landscape & smaller laptops — tighten slightly */
  @media (max-width: 1024px) {
    :root {
      --hud-gap: 12px;
    }
  }
  /* Tablet portrait */
  @media (max-width: 820px) {
    :root {
      --hud-left: 18px;
      --hud-top: 14px;
      --hud-gap: 11px;
      --hud-level-h: 38px;
      --hud-pu-h: 24px;
      --hud-combo-h: 24px;
    }
  }
  /* Mobile */
  @media (pointer: coarse) and (max-width: 520px) {
    :root {
      --hud-left: 14px;
      --hud-top: calc(12px + env(safe-area-inset-top, 0px));
      --hud-gap: 10px;
      --hud-level-h: 34px;
      --hud-pu-h: 22px;
      --hud-combo-h: 22px;
      --hud-stack: 2px;
    }
    .level-hud { padding: 6px 10px; }
    .level-hud #level { font-size: 14px; }
    .level-hud .level-label { font-size: 10px; }
    .pu-badge, .combo-hud, .streak-hud {
      padding: 5px 8px;
      font-size: 11px;
    }
  }
  /* Very small mobile (iPhone SE etc.) */
  @media (pointer: coarse) and (max-width: 380px) {
    :root {
      --hud-gap: 8px;
      --hud-level-h: 32px;
      --hud-pu-h: 20px;
      --hud-combo-h: 20px;
    }
  }

  .round-banner {
    position: absolute;
    left: 50%; top: 42%;
    transform: translate(-50%, -50%) scale(0.6);
    z-index: 18;
    pointer-events: none;
    opacity: 0;
    font-family: "Noto Sans Georgian", "Sylfaen", ui-sans-serif, system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 7vw, 92px);
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow:
      0 0 24px rgba(79, 209, 255, 0.85),
      0 0 48px rgba(122, 75, 255, 0.7),
      0 4px 0 rgba(10,8,30,0.7);
    white-space: nowrap;
  }
  .round-banner.show {
    animation: round-pop 1.6s cubic-bezier(.2,1.4,.5,1) forwards;
  }
  @keyframes round-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    40%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -70%) scale(0.95); }
  }

  /* ----------------------------------------------------------------
     Kill quotes (Georgian) — floating text above the kill site
  -----------------------------------------------------------------*/
  .quotes { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
  .quote {
    position: absolute;
    transform: translate(-50%, -50%);
    padding: 8px 14px;
    border-radius: 14px;
    background: rgba(10, 8, 30, 0.55);
    border: 1px solid rgba(180, 180, 255, 0.25);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    font-family: "BPG Nino Mtavruli", "Noto Sans Georgian", "Sylfaen",
                 ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 1.6vw, 22px);
    letter-spacing: 0.01em;
    white-space: nowrap;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    will-change: transform, opacity;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45),
                0 0 18px rgba(122, 75, 255, 0.25);
  }
  .quote::after {
    /* little speech-bubble tail */
    content: "";
    position: absolute;
    left: 22px; bottom: -7px;
    width: 12px; height: 12px;
    background: inherit;
    border-right: 1px solid rgba(180, 180, 255, 0.25);
    border-bottom: 1px solid rgba(180, 180, 255, 0.25);
    transform: rotate(45deg);
    border-bottom-right-radius: 3px;
  }

  /* ----------------------------------------------------------------
     Accessibility: respect reduced-motion
  -----------------------------------------------------------------*/
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* ----------------------------------------------------------------
     Smaller screens: shrink rocket and slow planets slightly.
  -----------------------------------------------------------------*/
  @media (max-width: 640px) {
    :root { --star-near: 5s; --star-mid: 10s; --star-far: 20s; }
    .rocket-wrap { width: 18vw; }
    .planet.one  { width: 160px; height: 160px; }
    .planet.two  { width: 110px; height: 110px; }
    .planet.three{ width:  80px; height:  80px; }
  }
</style>

<script>
/* ------------------------------------------------------------------
   Starfield generator — draws a 2×-tall field of stars into each
   canvas so the CSS translateY(50%) loop is seamless.
   Three layers with different density, size, and brightness give
   us depth without any JS animation loop.
-------------------------------------------------------------------*/
(function () {
  const layers = [
    { el: document.getElementById('starsFar'),  count: 160, sizeMin: 0.4, sizeMax: 1.1, alphaMin: 0.25, alphaMax: 0.7,  tint: false },
    { el: document.getElementById('starsMid'),  count: 110, sizeMin: 0.8, sizeMax: 1.8, alphaMin: 0.45, alphaMax: 0.9,  tint: true  },
    { el: document.getElementById('starsNear'), count:  60, sizeMin: 1.4, sizeMax: 2.8, alphaMin: 0.75, alphaMax: 1.0,  tint: true  },
  ];

  // Subtle blue/violet/white tint pool (no saturated colors)
  const TINTS = [
    [233, 236, 255], // white
    [210, 220, 255], // cool white
    [200, 190, 255], // faint violet
    [255, 235, 220], // faint warm
  ];

  function drawLayer(layer) {
    const { el } = layer;
    // Canvas is 2× viewport height so the 50% translate wraps cleanly.
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth;
    const h = window.innerHeight * 2;
    el.width  = w * dpr;
    el.height = h * dpr;
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
    const ctx = el.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < layer.count; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const r = layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin);
      const a = layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin);
      const [cr, cg, cb] = layer.tint
        ? TINTS[Math.floor(Math.random() * TINTS.length)]
        : TINTS[0];

      // Soft star — tight radial glow
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
      g.addColorStop(0,   `rgba(${cr},${cg},${cb},${a})`);
      g.addColorStop(0.4, `rgba(${cr},${cg},${cb},${a * 0.35})`);
      g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r * 3, 0, Math.PI * 2);
      ctx.fill();

      // Hard core
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${Math.min(1, a + 0.2)})`;
      ctx.beginPath();
      ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function draw() { layers.forEach(drawLayer); }

  // Debounced resize so we don't regenerate on every pixel
  let rid;
  window.addEventListener('resize', () => {
    clearTimeout(rid);
    rid = setTimeout(draw, 120);
  });
  draw();
})();

/* ------------------------------------------------------------------
   Ember particles — spawn periodically behind the rocket so the
   exhaust has follow-through / trailing hot bits.
-------------------------------------------------------------------*/
(function () {
  const host = document.getElementById('embers');
  if (!host) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const MAX = 24;
  function spawn() {
    if (host.childElementCount >= MAX) return;
    const e = document.createElement('span');
    e.className = 'ember';
    const drift = (Math.random() - 0.5) * 60;        // horizontal sway
    const dur   = 1.2 + Math.random() * 1.1;         // life (s)
    const size  = 2 + Math.random() * 2.5;
    const warm  = Math.random() < 0.5;
    e.style.setProperty('--drift', drift + 'px');
    e.style.animationDuration = dur + 's';
    e.style.width  = size + 'px';
    e.style.height = size + 'px';
    if (!warm) {
      e.style.background = 'var(--flame-cold)';
      e.style.boxShadow  = '0 0 6px var(--flame-cold), 0 0 14px #4a2bff';
    }
    host.appendChild(e);
    setTimeout(() => e.remove(), dur * 1000 + 50);
  }
  setInterval(spawn, 90);
})();

/* ------------------------------------------------------------------
   Keyboard flight controls
   Arrow keys or WASD move the rocket around the viewport with
   gentle acceleration + damping so it glides. Left/right also banks
   the rocket into the turn for a nicer feel.
   The pilot layer holds translate + rotate; .wobble / .vibe below
   it keep their idle jitter so the rocket still feels alive when idle.
-------------------------------------------------------------------*/
(function () {
  const pilot = document.getElementById('pilot');
  const hint  = document.getElementById('hint');
  if (!pilot) return;

  // State (in px, relative to the centered rocket rest position)
  let x = 0, y = 0;       // position offset
  let vx = 0, vy = 0;     // velocity
  let bank = 0;           // current bank angle (deg)

  // Expose live state + reset so other systems (lasers, UFOs, game) can read it.
  // Setters allow 1:1 drag controllers to write position/velocity directly.
  window.ROCKET = {
    get x()    { return x; },
    set x(v)   { x = v; },
    get y()    { return y; },
    set y(v)   { y = v; },
    get vx()   { return vx; },
    set vx(v)  { vx = v; },
    get vy()   { return vy; },
    set vy(v)  { vy = v; },
    get bank() { return bank; },
    get alive(){ return !window.GAME || !window.GAME.over; },
    // Direct input hook for touch controls — set any of
    // ROCKET.keys.up / down / left / right to true/false.
    keys: null, // set below after keys is defined
    // Tap-to-move: set {x, y} in rocket-offset space (0,0 = rest position)
    // and the flight loop will fly there. Set to null to release.
    target: null,
    reset() {
      x = 0; y = 0; vx = 0; vy = 0; bank = 0;
      for (const k in keys) keys[k] = false;
      window.ROCKET.target = null;
    },
  };

  // Tuning — touch devices fly faster toward tap targets, but with gentler
  // acceleration so the trip still feels deliberate.
  const IS_TOUCH = matchMedia('(pointer: coarse)').matches;
  const ACCEL    = IS_TOUCH ? 0.9  : 0.9;   // px / frame^2
  const MAX_V    = IS_TOUCH ? 14   : 14;    // max velocity (px / frame)
  const DAMP     = 0.88;
  const MAX_BANK = 18;    // deg
  const BANK_LERP= 0.12;  // how quickly bank catches up to target

  // Bounds — keep rocket within a safe margin of the viewport
  function bounds() {
    const margin = 60;
    return {
      minX: -window.innerWidth  / 2 + margin,
      maxX:  window.innerWidth  / 2 - margin,
      minY: -window.innerHeight / 2 + margin,
      maxY:  window.innerHeight / 2 - margin,
    };
  }

  // Input
  const keys = Object.create(null);
  window.ROCKET.keys = keys;
  const KEYMAP = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
  };

  let hintTimer = null;
  function fadeHint() {
    if (!hint) return;
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.classList.add('fade'), 2000);
  }
  fadeHint();

  window.addEventListener('keydown', (e) => {
    const dir = KEYMAP[e.key];
    if (!dir) return;
    keys[dir] = true;
    if (hint) hint.classList.add('fade');
    // Stop the page from scrolling on arrow keys.
    if (e.key.startsWith('Arrow') || e.key === ' ') e.preventDefault();
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    const dir = KEYMAP[e.key];
    if (dir) keys[dir] = false;
  });

  // Release keys when the tab loses focus so the rocket doesn't
  // keep accelerating into the void.
  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
  });

  function tick() {
    // Apply thrust
    let ax = 0, ay = 0;

    // Target-seek mode: if window.ROCKET.target is set (x,y in rocket-offset
    // space, i.e. same coords as `x`/`y`), accelerate toward it. This is
    // used by the mobile touch-to-move controller — tap a point and the
    // rocket flies there fast. Falls back to key thrust when no target.
    const T = window.ROCKET && window.ROCKET.target;
    if (T) {
      const dx = T.x - x, dy = T.y - y;
      const d  = Math.hypot(dx, dy);
      if (d > 2) {
        const nx = dx / d, ny = dy / d;
        ax += nx * ACCEL * 1.6;  // a little punchier for tap-to-move
        ay += ny * ACCEL * 1.6;
      } else {
        // Arrived — clear the target so damping brings us to rest.
        window.ROCKET.target = null;
      }
    } else {
      if (keys.left)  ax -= ACCEL;
      if (keys.right) ax += ACCEL;
      if (keys.up)    ay -= ACCEL;
      if (keys.down)  ay += ACCEL;
    }

    vx += ax; vy += ay;

    // Damp when no input on that axis
    if (!T) {
      if (!keys.left && !keys.right) vx *= DAMP;
      if (!keys.up   && !keys.down)  vy *= DAMP;
    } else {
      // Light global damping while seeking, so we don't overshoot wildly.
      vx *= 0.96; vy *= 0.96;
    }

    // Clamp velocity
    const v2 = vx * vx + vy * vy;
    if (v2 > MAX_V * MAX_V) {
      const s = MAX_V / Math.sqrt(v2);
      vx *= s; vy *= s;
    }

    // Integrate position
    x += vx; y += vy;

    // Constrain to viewport
    const b = bounds();
    if (x < b.minX) { x = b.minX; vx = 0; }
    if (x > b.maxX) { x = b.maxX; vx = 0; }
    if (y < b.minY) { y = b.minY; vy = 0; }
    if (y > b.maxY) { y = b.maxY; vy = 0; }

    // Bank into the turn — target angle proportional to vx
    const targetBank = Math.max(-MAX_BANK, Math.min(MAX_BANK, (vx / MAX_V) * MAX_BANK));
    bank += (targetBank - bank) * BANK_LERP;

    pilot.style.transform =
      `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) rotate(${bank.toFixed(2)}deg)`;

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

/* ------------------------------------------------------------------
   Combat: lasers + UFOs + game-over
-------------------------------------------------------------------*/
(function () {
  const laserHost = document.getElementById('lasers');
  const ufoHost   = document.getElementById('ufos');
  const fxHost    = document.getElementById('fx');
  const rocketWrap= document.getElementById('rocketWrap');
  const pilot     = document.getElementById('pilot');
  const overlay   = document.getElementById('gameOver');
  if (!laserHost || !ufoHost || !fxHost || !rocketWrap || !pilot) return;

  const GAME = window.GAME = { over: false, score: 0, level: 1, hp: 5, maxHp: 5 };
  const lifeFillEl = document.getElementById('lifeFill');
  const enemyBoltsHost = document.getElementById('enemyBolts');
  const enemyBolts = [];

  // Boss + endless-mode state. Each run starts normal so round 10 always
  // triggers the boss fight. Endless is only entered via the victory-screen
  // "Continue" button. The localStorage flag stays set on boss kill for
  // any future UI use, but it does NOT auto-engage endless on page load.
  let bossSpawned = false;
  let bossDefeated = false;
  let inEndless = false;
  let endlessStartTs = 0;
  function renderLife() {
    if (!lifeFillEl) return;
    const pct = Math.max(0, GAME.hp) / GAME.maxHp * 100;
    lifeFillEl.style.height = pct + '%';
    lifeFillEl.classList.remove('med', 'low');
    if (pct <= 33) lifeFillEl.classList.add('low');
    else if (pct <= 66) lifeFillEl.classList.add('med');
  }
  function damage(n) {
    if (GAME.over) return;
    GAME.hp -= n;
    renderLife();
    try { SFX.hit(); } catch (_) {}
    if (rocketWrap) {
      rocketWrap.classList.add('hit-flash');
      setTimeout(() => rocketWrap && rocketWrap.classList.remove('hit-flash'), 110);
    }
    if (GAME.hp <= 0) gameOver();
  }
  window.__damage = damage;
  window.__heal = function (n) {
    if (GAME.over) return;
    GAME.hp = Math.min(GAME.maxHp, GAME.hp + n);
    renderLife();
  };
  window.__renderLife = renderLife;
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const roundBannerEl = document.getElementById('roundBanner');
  const bonusBannerEl = document.getElementById('bonusBanner');

  // ---- Combo + coin-streak tracking ----
  const comboHud     = document.getElementById('comboHud');
  const comboCountEl = document.getElementById('comboCount');
  const streakHud    = document.getElementById('streakHud');
  const streakCountEl= document.getElementById('streakCount');
  const COMBO_THRESHOLD      = 10;
  const COMBO_MULT           = 2;
  const COIN_STREAK_THRESHOLD= 5;
  const COIN_STREAK_BONUS    = 25;
  let comboCount = 0, comboActive = false;
  let coinStreak = 0;

  function updateComboHud() {
    if (!comboHud) return;
    if (comboCount > 0) {
      comboHud.classList.add('on');
      comboHud.classList.toggle('active', comboActive);
      if (comboCountEl) {
        comboCountEl.textContent = comboActive
          ? String(comboCount)
          : comboCount + '/' + COMBO_THRESHOLD;
      }
    } else {
      comboHud.classList.remove('on', 'active');
    }
  }
  function breakCombo() {
    if (comboCount === 0 && !comboActive) return;
    comboCount = 0; comboActive = false;
    updateComboHud();
  }
  function updateStreakHud() {
    if (!streakHud) return;
    if (coinStreak > 0) {
      streakHud.classList.add('on');
      if (streakCountEl) streakCountEl.textContent = coinStreak + '/' + COIN_STREAK_THRESHOLD;
    } else {
      streakHud.classList.remove('on');
    }
  }
  function breakStreak() {
    if (coinStreak === 0) return;
    coinStreak = 0;
    updateStreakHud();
  }
  function showBonusBanner(text) {
    if (!bonusBannerEl) return;
    bonusBannerEl.textContent = text;
    bonusBannerEl.classList.remove('show');
    void bonusBannerEl.offsetWidth;
    bonusBannerEl.classList.add('show');
  }

  // Level config — 10 rounds, speed ramps up. Level 1 is slow on purpose
  // so players can learn the controls. Multiplier applies to base UFO vy
  // and slightly tightens spawn cadence at higher levels.
  const MAX_LEVEL = 10;
  const LEVEL_PER_POINTS = 20;
  // speed multiplier per level (1..10). Level 1 = 0.55x base, 10 = 2.4x base.
  const LEVEL_SPEED = [0.55, 0.80, 1.05, 1.30, 1.55, 1.80, 2.00, 2.15, 2.28, 2.40];
  window.LEVEL_SPEED = LEVEL_SPEED;

  // World speed multiplier — clamps to level 10's value, then endless mode
  // adds +8% per level above 10 so pacing keeps ramping.
  function levelMult() {
    const base = LEVEL_SPEED[Math.min(9, GAME.level - 1)] || 1;
    // In endless mode, difficulty scales with time spent in endless.
    let endlessBonus = 1;
    if (inEndless && endlessStartTs > 0) {
      const endlessSeconds = (performance.now() - endlessStartTs) / 1000;
      // +8% difficulty every 20 seconds in endless, capped at +80%
      endlessBonus = 1 + Math.min(0.8, Math.floor(endlessSeconds / 20) * 0.08);
    }
    return base * endlessBonus;
  }

  // Roman-style round labels in Georgian
  const ROUND_ROMAN = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X'];
  function roundLabel(n) {
    return ROUND_ROMAN[Math.max(0, Math.min(9, n - 1))] + ' რაუნდი';
  }

  function setLevel(n) {
    // Level is always capped at MAX_LEVEL (10). In endless mode,
    // difficulty continues to scale via endlessBonus but the display
    // shows an infinity symbol instead of a round number.
    GAME.level = Math.max(1, Math.min(MAX_LEVEL, n));
    if (levelEl) {
      levelEl.textContent = inEndless
        ? '∞'
        : roundLabel(GAME.level);
      levelEl.classList.toggle('infinity', !!inEndless);
    }
  }
  function maybeLevelUp() {
    // In endless mode, never advance level beyond 10 (difficulty is
    // scaled elsewhere via endlessBonus). This keeps round banners
    // and visual progression from counting past ∞.
    const cap = inEndless ? MAX_LEVEL : MAX_LEVEL;
    const target = Math.min(cap, 1 + Math.floor(GAME.score / LEVEL_PER_POINTS));
    if (target !== GAME.level) {
      setLevel(target);
      // Suppress round banners in endless mode — level 10 is the
      // last banner ever shown.
      if (!inEndless) showRoundBanner(target);
      SFX.levelUp();
    }
  }
  function showRoundBanner(n) {
    if (!roundBannerEl) return;
    roundBannerEl.textContent = roundLabel(n);
    roundBannerEl.classList.remove('show');
    // Force reflow so the animation restarts even if it was mid-play
    void roundBannerEl.offsetWidth;
    roundBannerEl.classList.add('show');
  }
  function awardScore(n) {
    GAME.score += n;
    if (scoreEl) {
      scoreEl.textContent = String(GAME.score);
      scoreEl.classList.remove('bump');
      void scoreEl.offsetWidth;
      scoreEl.classList.add('bump');
      setTimeout(() => scoreEl.classList.remove('bump'), 180);
    }
    maybeLevelUp();
  }

  // ---- Sound effects (Web Audio API, synthesized on the fly) ----
  // No external files. Unlocked on first user gesture so mobile Safari
  // will actually play them.
  const SFX = (function () {
    let ctx = null;
    let unlocked = false;
    function ac() {
      if (ctx) return ctx;
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (_) { ctx = null; }
      return ctx;
    }
    function unlock() {
      const a = ac(); if (!a) return;
      if (a.state === 'suspended') a.resume();
      unlocked = true;
    }
    // Laser pew — quick downward pitch sweep, triangle wave
    function laser() {
      const a = ac(); if (!a || !unlocked) return;
      const t = a.currentTime;
      const o = a.createOscillator();
      const g = a.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(1400, t);
      o.frequency.exponentialRampToValueAtTime(280, t + 0.12);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.28, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t + 0.16);
    }
    // Explosion — BIG crunchy boom. Distorted crack + thunder + metal shrapnel.
    function explosion() {
      const a = ac(); if (!a || !unlocked) return;
      const t = a.currentTime;
      const master = a.createGain();
      master.gain.value = 1.0;
      master.connect(a.destination);
      const shaper = a.createWaveShaper();
      const n = 512; const curve = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const x = (i / n) * 2 - 1;
        curve[i] = Math.tanh(x * 3);
      }
      shaper.curve = curve; shaper.oversample = '4x';
      shaper.connect(master);

      // Transient pop
      const pop = a.createBuffer(1, Math.floor(a.sampleRate * 0.05), a.sampleRate);
      const pd = pop.getChannelData(0);
      for (let i = 0; i < pd.length; i++) {
        const env = Math.pow(1 - i / pd.length, 2.5);
        pd[i] = (Math.random() * 2 - 1) * env;
      }
      const ps = a.createBufferSource(); ps.buffer = pop;
      const pg = a.createGain();
      pg.gain.setValueAtTime(1.1, t);
      pg.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
      ps.connect(pg); pg.connect(shaper);
      ps.start(t); ps.stop(t + 0.06);

      // Mid crack
      const crackBuf = a.createBuffer(1, Math.floor(a.sampleRate * 0.3), a.sampleRate);
      const cd = crackBuf.getChannelData(0);
      for (let i = 0; i < cd.length; i++) {
        const env = Math.pow(1 - i / cd.length, 1.4);
        cd[i] = (Math.random() * 2 - 1) * env;
      }
      const crackSrc = a.createBufferSource(); crackSrc.buffer = crackBuf;
      const bp = a.createBiquadFilter(); bp.type = 'bandpass';
      bp.frequency.setValueAtTime(2800, t); bp.Q.value = 0.7;
      bp.frequency.exponentialRampToValueAtTime(600, t + 0.3);
      const cg = a.createGain();
      cg.gain.setValueAtTime(0.0001, t);
      cg.gain.exponentialRampToValueAtTime(1.1, t + 0.004);
      cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
      crackSrc.connect(bp); bp.connect(cg); cg.connect(shaper);
      crackSrc.start(t); crackSrc.stop(t + 0.3);

      // Thunder body
      const dur = 1.1;
      const bodyBuf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
      const bd = bodyBuf.getChannelData(0);
      for (let i = 0; i < bd.length; i++) {
        const env = Math.pow(1 - i / bd.length, 1.3);
        bd[i] = (Math.random() * 2 - 1) * env;
      }
      const bodySrc = a.createBufferSource(); bodySrc.buffer = bodyBuf;
      const lp = a.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(2400, t);
      lp.frequency.exponentialRampToValueAtTime(90, t + dur);
      const bg = a.createGain();
      bg.gain.setValueAtTime(0.0001, t);
      bg.gain.exponentialRampToValueAtTime(0.85, t + 0.03);
      bg.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      bodySrc.connect(lp); lp.connect(bg); bg.connect(shaper);
      bodySrc.start(t); bodySrc.stop(t + dur);

      // Sub boom
      const o = a.createOscillator();
      const og = a.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.55);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.95, t + 0.018);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
      o.connect(og); og.connect(master);
      o.start(t); o.stop(t + 0.75);

      // Shrapnel
      const m = a.createOscillator();
      const mg = a.createGain();
      m.type = 'sawtooth';
      m.frequency.setValueAtTime(800, t + 0.03);
      m.frequency.exponentialRampToValueAtTime(150, t + 0.35);
      mg.gain.setValueAtTime(0.0001, t + 0.03);
      mg.gain.exponentialRampToValueAtTime(0.28, t + 0.06);
      mg.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
      m.connect(mg); mg.connect(shaper);
      m.start(t + 0.03); m.stop(t + 0.4);
    }

    // Mega explosion — for player death. Longer, deeper, double crack.
    function megaExplosion() {
      const a = ac(); if (!a || !unlocked) return;
      const t = a.currentTime;
      // Layered cracks with slight delay for that "ka-boom" feel
      for (const [dt, amp, bpFreq] of [[0, 1.0, 2600], [0.12, 0.85, 1800]]) {
        const buf = a.createBuffer(1, Math.floor(a.sampleRate * 0.32), a.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          const env = Math.pow(1 - i / d.length, 1.5);
          d[i] = (Math.random() * 2 - 1) * env;
        }
        const s = a.createBufferSource(); s.buffer = buf;
        const bp = a.createBiquadFilter(); bp.type = 'bandpass';
        bp.frequency.setValueAtTime(bpFreq, t + dt); bp.Q.value = 0.7;
        const g = a.createGain();
        g.gain.setValueAtTime(0.0001, t + dt);
        g.gain.exponentialRampToValueAtTime(amp, t + dt + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.32);
        s.connect(bp); bp.connect(g); g.connect(a.destination);
        s.start(t + dt); s.stop(t + dt + 0.32);
      }
      // Long rumble body
      const dur = 1.8;
      const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        const env = Math.pow(1 - i / d.length, 1.2);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const s = a.createBufferSource(); s.buffer = buf;
      const lp = a.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(2600, t);
      lp.frequency.exponentialRampToValueAtTime(80, t + dur);
      const g = a.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.95, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      s.connect(lp); lp.connect(g); g.connect(a.destination);
      s.start(t); s.stop(t + dur);
      // Deep sub boom, long decay
      const o = a.createOscillator();
      const og = a.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, t);
      o.frequency.exponentialRampToValueAtTime(22, t + 1.2);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.95, t + 0.02);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 1.3);
      o.connect(og); og.connect(a.destination);
      o.start(t); o.stop(t + 1.4);
      // Metal creak (sawtooth, brief)
      const m = a.createOscillator();
      const mg = a.createGain();

    return {

      y: window.innerHeight / 2 + R.y,
      bank: R.bank,

  function rocketSize() {

  const EDGE_BUFFER = 70;
  function spawnXRange(elementWidth) {
    const halfW = elementWidth / 2;
    const minX = EDGE_BUFFER - halfW;

    const s = rocketSize();
    // Nose tip is at top of rocket, rotated by bank around the center.
    const rad = (c.bank) * Math.PI / 180;
    const up  = s.h * 0.44; // distance from center to nose tip
    const nx  = c.x + Math.sin(rad) * up;
    const ny  = c.y - Math.cos(rad) * up;
    const vx  = Math.sin(rad) * BOLT_SPEED;
    const vy  = -Math.cos(rad) * BOLT_SPEED;

    const el = document.createElement('div');
    el.className = 'laser';

    el.style.transform = `translate(-50%, -50%) rotate(${c.bank}deg)`;

  function updateBoss(now, step, slowK) {
    if (!boss) return;
    // Entry: drop in from above until the target Y is reached.
    if (boss.y < boss.targetY) {
      boss.y += 2 * step;
      boss.el.style.top = boss.y + 'px';
      return;
    }
    // Horizontal sweep with wall bounce.
    boss.x += boss.vx * step * slowK;
    if (boss.x < 20 || boss.x > window.innerWidth - boss.w - 20) boss.vx *= -1;
    boss.el.style.left = boss.x + 'px';

    // Three-phase attack: single, spread-3, burst-3.
    const interval = 1400;
    if (now - boss.lastShot > interval) {
      boss.lastShot = now;
      boss.phase = (boss.phase + 1) % 3;
      const cx = boss.x + boss.w / 2;
      const cy = boss.y + boss.h * 0.95;
      if (boss.phase === 0) {
        spawnEnemyBolt(cx, cy);
      } else if (boss.phase === 1) {
        spawnEnemyBolt(cx - 30, cy);
        spawnEnemyBolt(cx, cy);
        spawnEnemyBolt(cx + 30, cy);
      } else {
        spawnEnemyBolt(cx, cy);
        setTimeout(() => !GAME.over && boss && spawnEnemyBolt(cx, cy), 160);
        setTimeout(() => !GAME.over && boss && spawnEnemyBolt(cx, cy), 320);
      }
    }

    // Detect shield-camping: rocket fully inside the boss AABB while shield
    // is up. In that case bolts born from the rocket's nose spawn already
    // inside the boss and would chain-hit it; we consume them without
    // damage so shield can't be used to cheese the fight.
    const rcPre = rocketCenter();
    const rocketInsideBoss =
      rcPre.x > boss.x && rcPre.x < boss.x + boss.w &&
      rcPre.y > boss.y && rcPre.y < boss.y + boss.h;
    const shieldCamping = rocketInsideBoss &&
      window.POWERUP && window.POWERUP.shieldActive();

    // Boss vs player lasers (rectangle hitbox around the sprite).
    for (let j = bolts.length - 1; j >= 0; j--) {
      const b = bolts[j];
      if (b.x > boss.x && b.x < boss.x + boss.w &&
          b.y > boss.y && b.y < boss.y + boss.h) {
        bolts[j].el.remove(); bolts.splice(j, 1);
        if (shieldCamping) continue; // silently absorb — no damage to boss
        boss.hp -= 1;
        boss.el.classList.add('flash');
        setTimeout(() => boss && boss.el.classList.remove('flash'), 80);
        burst(b.x, b.y, { count: 8, hue: 'warm' });
        try { SFX.hit(); } catch (_) {}
        const fill = document.getElementById('bossBarFill');
        if (fill) fill.style.width = Math.max(0, (boss.hp / boss.maxHp) * 100) + '%';
        if (boss.hp <= 0) { killBoss(); return; }
      }
    }

    // Ram contact: shield absorbs and flashes; otherwise the rocket takes 1 HP.
    if (!GAME.over && rocketInsideBoss) {
      if (shieldCamping) {
        if (window.__shieldFlash) window.__shieldFlash();
      } else {
        if (window.__damage) window.__damage(1);
      }
    }
  }

  function killBoss() {
    if (!boss) return;
    burst(boss.x + boss.w/2, boss.y + boss.h/2, { count: 80, hue: 'warm' });
    try { SFX.megaExplosion(); } catch (_) {}
    const stage = document.querySelector('.stage');
    if (stage) {
      stage.classList.add('shake');
      setTimeout(() => stage.classList.remove('shake'), 900);
    }
    boss.el.remove();
    const bar = document.getElementById('bossBar');
    if (bar) bar.remove();
    boss = null;
    bossDefeated = true;
    GAME.score += 100;
    if (scoreEl) scoreEl.textContent = String(GAME.score);
    try { localStorage.setItem('rocketgame_endless_unlocked', '1'); } catch (_) {}
    showVictoryScreen();
  }
