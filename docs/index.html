  // Wire the victory buttons with direct per-element handlers.
  // pointerup fires reliably on both touch and mouse, and attaching
  // directly to each button sidesteps any document-level listener
  // that might swallow or reorder events on mobile. touchend is
  // kept as a belt-and-braces fallback for older WebViews; click
  // covers keyboard activation. A shared guard dedups the overlap.
  (function wireVictoryButtons() {
    function bind(id, fn) {
      const btn = document.getElementById(id);
      if (!btn) return;
      let handling = false;
      function handle(ev) {
        if (handling) { ev.preventDefault && ev.preventDefault(); return; }
        handling = true;
        ev.preventDefault && ev.preventDefault();
        ev.stopPropagation && ev.stopPropagation();
        try { console.log('[Victory] Button tap:', id, 'via', ev.type); } catch(_) {}
        fn();
        setTimeout(() => { handling = false; }, 700);
      }
      btn.addEventListener('pointerup', handle);
      btn.addEventListener('touchend', handle, { passive: false });
      btn.addEventListener('click', handle);
    }
    bind('victoryContinueBtn', continueToEndless);
    bind('victoryRestartBtn', restartFromVictory);
  })();

  // Galaxy-style fireworks — colorful bursts across the screen
  function launchFireworks(durationMs) {
    const colors = [
      ['#ffd76a', '#ff9a3a'],
      ['#ff5a8a', '#c04aff'],
      ['#7be0ff', '#4faaff'],
      ['#a8ff7b', '#4af0a0'],
      ['#ffffff', '#ffd76a'],
    ];
    let elapsed = 0;
    const interval = 280;
    const timer = setInterval(() => {
      const fx = document.getElementById('fx');
      if (!fx) { clearInterval(timer); return; }
      const cx = 60 + Math.random() * (window.innerWidth - 120);
      const cy = 80 + Math.random() * (window.innerHeight * 0.55);
      const pair = colors[Math.floor(Math.random() * colors.length)];
      const count = 22 + Math.floor(Math.random() * 10);
      for (let i = 0; i < count; i++) {
        const p = document.createElement('span');
        p.className = 'particle ' + (Math.random() < 0.5 ? 'warm' : 'cool');
        Object.assign(p.style, {
          left: cx + 'px',
          top: cy + 'px',
          width: (4 + Math.random() * 3) + 'px',
          height: (4 + Math.random() * 3) + 'px',
          background: pair[0],
          boxShadow: `0 0 10px ${pair[0]}, 0 0 22px ${pair[1]}`,
          zIndex: 16,
        });
        fx.appendChild(p);
        const ang = (i / count) * Math.PI * 2 + Math.random() * 0.3;
        const spd = 3 + Math.random() * 6;
        const life = 900 + Math.random() * 700;
        const start = performance.now();
        const gravity = 0.08;
        let vx0 = Math.cos(ang) * spd;
        let vy0 = Math.sin(ang) * spd;
        function step() {
          const t = performance.now() - start;
          const k = Math.min(1, t / life);
          vy0 += gravity;
          const x = cx + vx0 * (t / 16);
          const y = cy + vy0 * (t / 16);
          p.style.transform = `translate(${x - cx}px, ${y - cy}px)`;
          p.style.opacity = String(1 - k);
          if (k < 1) requestAnimationFrame(step);
          else p.remove();
        }
        requestAnimationFrame(step);
      }
      elapsed += interval;
      if (elapsed >= durationMs) clearInterval(timer);
    }, interval);
  }

  // ---- Enemy bolts (red, from gun UFOs) ----
  const ENEMY_BOLT_SPEED_BASE = 5;
  function spawnEnemyBolt(sx, sy) {
    if (!enemyBoltsHost) return;
    // Aim roughly at the rocket's current position, with small spread
    const c = rocketCenter();
    const dx = c.x - sx, dy = c.y - sy;
    const d  = Math.hypot(dx, dy) || 1;
    const spread = (Math.random() - 0.5) * 0.18; // radians
    const ang = Math.atan2(dy, dx) + spread;
    const mult = levelMult();
    const spd = ENEMY_BOLT_SPEED_BASE * Math.max(1, mult);
    const vx = Math.cos(ang) * spd;
    const vy = Math.sin(ang) * spd;
    const el = document.createElement('div');
    el.className = 'enemy-bolt';
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    const rotDeg = (Math.atan2(vy, vx) * 180 / Math.PI) + 90;
    el.style.transform = `translate(-50%, -50%) rotate(${rotDeg}deg)`;
    enemyBoltsHost.appendChild(el);
    enemyBolts.push({ el, x: sx, y: sy, vx, vy });
    try { SFX.enemyShot(); } catch (_) {}
  }
  function hitRocketVsEnemyBolt(b) {
    const c = rocketCenter();
    const s = rocketSize();
    const halfW = s.w * 0.42 + 4;
    const halfH = s.h * 0.42 + 4;
    const dx = c.x - b.x, dy = c.y - b.y;
    return (dx*dx) / (halfW*halfW) + (dy*dy) / (halfH*halfH) < 1;
  }

  }

  function hitRockVsBolt(r, b) {
    const dx = (r.x + r.w/2) - b.x;
    const dy = (r.y + r.h/2) - b.y;
    return (dx*dx + dy*dy) < (r.w*0.5)*(r.w*0.5);
  }
  function hitRocketVsRock(r) {
    const c = rocketCenter();
    const s = rocketSize();
    const rcx = r.x + r.w / 2, rcy = r.y + r.h / 2;
    const halfW = s.w * 0.45 + r.w * 0.38;
    const halfH = s.h * 0.45 + r.h * 0.38;
    const dx = c.x - rcx, dy = c.y - rcy;
    return (dx*dx) / (halfW*halfW) + (dy*dy) / (halfH*halfH) < 1;
  }

  // ---- Comets (telegraphed dodge hazards) ----
  const comets = [];
  const cometWarnings = [];
  let nextComet = performance.now() + 18000;

  function spawnComet() {
    if (GAME.over || GAME.level < 5) return;
    const startX = Math.random() < 0.5 ? -80 : window.innerWidth + 80;
    const startY = 80 + Math.random() * (window.innerHeight * 0.5);
    const endX = startX < 0 ? window.innerWidth + 80 : -80;
    const endY = startY + (Math.random() - 0.5) * 200;
    // Warning streak along the comet's path
    const warn = document.createElement('div');
    const ang = Math.atan2(endY - startY, endX - startX);
    const len = Math.hypot(endX - startX, endY - startY);
    Object.assign(warn.style, {
      position: 'absolute',
      left: startX + 'px', top: (startY - 2) + 'px',
      width: len + 'px', height: '4px',
      transformOrigin: '0 50%',
      transform: `rotate(${ang}rad)`,
      background: 'linear-gradient(to right, rgba(255,80,100,0), rgba(255,80,100,0.9), rgba(255,80,100,0))',
      boxShadow: '0 0 12px rgba(255, 80, 100, 0.8)',
      zIndex: 3, pointerEvents: 'none',
      animation: 'comet-warn-blink 0.18s linear infinite',
    });
    hazardHost.appendChild(warn);
    cometWarnings.push({ el: warn, until: performance.now() + 1100 });
    // Fire the laser 1.1s later — beam shape matches the telegraphed path.
    setTimeout(() => {
      if (GAME.over) { warn.remove(); return; }
      const beamW = 140, beamH = 10;
      const el = document.createElement('div');
      Object.assign(el.style, {
        position: 'absolute',
        left: startX + 'px', top: (startY - beamH / 2) + 'px',
        width: beamW + 'px', height: beamH + 'px',
        zIndex: 3, pointerEvents: 'none',
        transform: `rotate(${ang}rad)`,
        filter: 'drop-shadow(0 0 10px #ff6070) drop-shadow(0 0 22px #ff3550)',
      });
      const uid = Date.now().toString(36) + Math.floor(Math.random() * 1e6).toString(36);
      el.innerHTML = `
        <svg viewBox="0 0 140 10" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="cmtG_${uid}" x1="0" y1="0.5" x2="1" y2="0.5">
              <stop offset="0%"   stop-color="rgba(255,90,110,0)"/>
              <stop offset="18%"  stop-color="#ff5a6e"/>
              <stop offset="50%"  stop-color="#ffffff"/>
              <stop offset="82%"  stop-color="#ff5a6e"/>
              <stop offset="100%" stop-color="rgba(255,90,110,0)"/>
            </linearGradient>
          </defs>
          <rect x="0" y="3" width="140" height="4" rx="2" fill="url(#cmtG_${uid})"/>
          <rect x="0" y="4.25" width="140" height="1.5" rx="0.75" fill="#ffffff" opacity="0.85"/>
        </svg>`;
      hazardHost.appendChild(el);
      const vx = (endX - startX) / 60;
      const vy = (endY - startY) / 60;
      comets.push({ el, x: startX, y: startY - beamH / 2, w: beamW, h: beamH, vx, vy });
    }, 1100);
  }

  function hitRocketVsComet(c2) {
    const c = rocketCenter();
    const s = rocketSize();
    const ccx = c2.x + c2.w / 2, ccy = c2.y + c2.h / 2;
    const halfW = s.w * 0.45 + c2.w * 0.38;
    const halfH = s.h * 0.45 + c2.h * 0.38;
    const dx = c.x - ccx, dy = c.y - ccy;
    return (dx*dx) / (halfW*halfW) + (dy*dy) / (halfH*halfH) < 1;
  }

  // ---- Effects: explosion burst ----
  function burst(x, y, opts = {}) {
    const count = opts.count || 18;
    const hue = opts.hue || 'warm'; // warm | cool
    for (let i = 0; i < count; i++) {
      const p = document.createElement('span');
      p.className = 'particle ' + hue;
      const ang = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 6;
      const life = 600 + Math.random() * 500;
      p.style.left = x + 'px';
      p.style.top  = y + 'px';
      fxHost.appendChild(p);
      const start = performance.now();
      const vx = Math.cos(ang) * spd;
      const vy = Math.sin(ang) * spd;
      function step(now) {
        const t = (now - start) / life;
        if (t >= 1) { p.remove(); return; }
        const px = x + vx * (t * 60);
        const py = y + vy * (t * 60) + 40 * t * t; // slight gravity
        p.style.transform = `translate(${px - x}px, ${py - y}px) scale(${1 - t})`;
        p.style.opacity = String(1 - t);
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
  }

  // ---- Coin flyer: animate a gold coin from kill site to the score HUD ----
  function flyCoin(sx, sy) {
    if (!scoreEl) return;
    const rect = document.querySelector('.score .coin').getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top  + rect.height / 2;

    const coin = document.createElement('div');
    coin.className = 'coin-flyer';
    coin.innerHTML = `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="url(#coinG)" stroke="#7a4a00" stroke-width="1"/>
        <circle cx="12" cy="12" r="7" fill="none" stroke="#a76a00" stroke-width="0.8" opacity="0.7"/>
        <text x="12" y="15.8" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" font-weight="800" fill="#7a4a00">¤</text>
      </svg>`;
    coin.style.left = sx + 'px';
    coin.style.top  = sy + 'px';
    fxHost.appendChild(coin);

    const DUR = 650;
    const start = performance.now();
    // Arc via a control point above the midpoint
    const mx = (sx + tx) / 2;
    const my = Math.min(sy, ty) - 80 - Math.random() * 40;

    function step(now) {
      const t = Math.min(1, (now - start) / DUR);
      // Quadratic bezier
      const it = 1 - t;
      const px = it*it*sx + 2*it*t*mx + t*t*tx;
      const py = it*it*sy + 2*it*t*my + t*t*ty;
      coin.style.transform = `translate(${px - sx}px, ${py - sy}px) rotate(${t * 540}deg) scale(${1 - t * 0.3})`;
      coin.style.opacity = String(t > 0.9 ? (1 - t) * 10 : 1);
      if (t < 1) requestAnimationFrame(step);
      else {
        coin.remove();
        // Pulse the score on arrival
        scoreEl.classList.remove('bump');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('bump');
        setTimeout(() => scoreEl.classList.remove('bump'), 180);
      }
    }
    requestAnimationFrame(step);
  }

  // ---- Collisions (AABB-ish using circles) ----
  function hitUFOvsBolt(u, b) {
    const cx = u.x + u.w / 2, cy = u.y + u.h / 2;
    const dx = cx - b.x, dy = cy - b.y;
    const r = (u.w * 0.45);
    return dx*dx + dy*dy < r*r;
  }
  function hitRocketVsUFO(u) {
    const c = rocketCenter();
    const s = rocketSize();
    const ucx = u.x + u.w / 2, ucy = u.y + u.h / 2;
    const halfW = s.w * 0.45 + u.w * 0.38;
    const halfH = s.h * 0.45 + u.h * 0.38;
    const dx = c.x - ucx, dy = c.y - ucy;
    return (dx*dx) / (halfW*halfW) + (dy*dy) / (halfH*halfH) < 1;
  }

  // ---- Game-over ----
  function megaBurst(cx, cy) {
    // Shockwave ring
    const ring = document.createElement('div');
    ring.className = 'shockwave';
    ring.style.left = cx + 'px';
    ring.style.top  = cy + 'px';
    fxHost.appendChild(ring);
    setTimeout(() => ring.remove(), 1200);
    // Second slower ring
    const ring2 = document.createElement('div');
    ring2.className = 'shockwave slow';
    ring2.style.left = cx + 'px';
    ring2.style.top  = cy + 'px';
    fxHost.appendChild(ring2);
    setTimeout(() => ring2.remove(), 1600);
    // White flash fullscreen
    const flash = document.createElement('div');
    flash.className = 'bigflash';
    fxHost.appendChild(flash);
    setTimeout(() => flash.remove(), 700);
    // Particle storms
    burst(cx, cy, { count: 140, hue: 'warm' });
    burst(cx, cy, { count: 80,  hue: 'cool' });
    // Staggered secondary bursts
    setTimeout(() => { burst(cx + 60,  cy - 30, { count: 40, hue: 'warm' }); }, 120);
    setTimeout(() => { burst(cx - 50,  cy + 20, { count: 40, hue: 'warm' }); }, 220);
    setTimeout(() => { burst(cx + 10,  cy - 70, { count: 50, hue: 'cool' }); }, 340);
    // Screen shake
    const stage = document.querySelector('.stage');
    if (stage) {
      stage.classList.add('shake');
      setTimeout(() => stage.classList.remove('shake'), 900);
    }
  }
  function gameOver() {
    if (GAME.over) return;
    GAME.over = true;
    firing = false;
    const c = rocketCenter();
    megaBurst(c.x, c.y);
    try { SFX.megaExplosion(); } catch (_) {}
    rocketWrap.classList.add('destroyed');
    if (overlay) overlay.classList.add('show');
    // Auto-reset after 2.2s
    setTimeout(reset, 2200);
  }
  function reset() {
    // Clear bolts + ufos
    bolts.forEach(b => b.el.remove()); bolts.length = 0;
    ufos .forEach(u => u.el.remove()); ufos.length = 0;
    fxHost.innerHTML = '';
    if (overlay) overlay.classList.remove('show');
    rocketWrap.classList.remove('destroyed');
    if (window.ROCKET) window.ROCKET.reset();
    GAME.score = 0;
    if (scoreEl) scoreEl.textContent = '0';
    GAME.hp = GAME.maxHp;
    renderLife();
    enemyBolts.forEach(b => b.el.remove()); enemyBolts.length = 0;
    rocks.forEach(r => r.el.remove()); rocks.length = 0;
    comets.forEach(c => c.el.remove()); comets.length = 0;
    cometWarnings.forEach(w => w.el.remove()); cometWarnings.length = 0;
    // Boss cleanup — each new run starts fresh so the round 10
    // boss fight always triggers. localStorage flag remains set
    // for any future UI use, but does not auto-engage endless.
    if (boss) { boss.el.remove(); boss = null; }
    const bossBar = document.getElementById('bossBar');
    if (bossBar) bossBar.remove();
    const victoryScr = document.getElementById('victoryScreen');
    if (victoryScr) victoryScr.classList.remove('show');
    bossSpawned    = false;
    bossDefeated   = false;
    inEndless      = false;
    endlessStartTs = 0;
    nextRock   = performance.now() + 4000;
    nextComet  = performance.now() + 18000;
    setLevel(1);
    breakCombo();
    breakStreak();
    GAME.over = false;
    nextSpawn = performance.now() + 600;
  }

  // Shared kill-reward path. Caller handles burst + DOM removal + splice.
  function registerUFOKill(u, kx, ky) {
    // Splitter: fire two smaller saucers outward before scoring.
    if (u.isSplitter && !u.isMini) {
      spawnMiniSplitter(u.x + u.w/2 - 22, u.y + u.h/2,  -45);
      spawnMiniSplitter(u.x + u.w/2 - 22, u.y + u.h/2, -135);
    }
    const base = u.isGun ? 4 : u.isSplitter ? 3 : u.isSine ? 3 : 1;
    const mult = comboActive ? COMBO_MULT : 1;
    GAME.score += base * mult;
    if (scoreEl) {
      scoreEl.textContent = String(GAME.score);
      scoreEl.classList.add('bump');
      setTimeout(() => scoreEl.classList.remove('bump'), 160);
    }
    const coinCount = u.isGun ? 4 : 1;
    for (let ci = 0; ci < coinCount; ci++) {
      setTimeout(() => flyCoin(kx + (Math.random()-0.5)*30, ky + (Math.random()-0.5)*30), ci * 70);
    }
    comboCount++;
    if (comboCount >= COMBO_THRESHOLD && !comboActive) {
      comboActive = true;
      showBonusBanner('×' + COMBO_MULT + ' კომბო!');
    }
    updateComboHud();
    maybeLevelUp();
    if (window.__onUFOKill) window.__onUFOKill(kx, ky);
  }

  // Bomb powerup: wipe every UFO and every enemy bolt on screen.
  window.__killAllUFOs = function () {
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      const kx = u.x + u.w/2, ky = u.y + u.h/2;
      burst(kx, ky, { count: 22, hue: 'warm' });
      u.el.remove();
      registerUFOKill(u, kx, ky);
    }
    ufos.length = 0;
    for (const b of enemyBolts) b.el.remove();
    enemyBolts.length = 0;
    try { SFX.megaExplosion(); } catch (_) {}
  };

  // Called by the powerup module's shield when absorbing a blow.
  window.__shieldFlash = function () {
    const halo = document.getElementById('shieldHalo');
    if (!halo) return;
    halo.style.transition = 'filter .12s';
    halo.style.filter = 'brightness(2) saturate(1.5)';
    setTimeout(() => halo && (halo.style.filter = ''), 140);
  };

  // ---- Main combat tick ----
  let lastFrameTs = 0;
  function tick(now) {
    // Frame-rate-independent step. Browsers (iOS Safari especially) may
    // throttle rAF to ~30Hz when idle and boost back to 60Hz during active
    // touch — that caused UFOs to visibly "accelerate" while the user was
    // dragging. Normalize every per-frame delta against a 60Hz baseline.
    let step = 1;
    if (lastFrameTs) {
      step = (now - lastFrameTs) / (1000 / 60);
      // Clamp to sane range — avoids a giant jump after a tab-switch.
      if (step < 0.2) step = 0.2;
      if (step > 3)   step = 3;
    }
    lastFrameTs = now;

    // Slow-motion powerup: halves the world's step (UFOs, enemy bolts, pickups);
    // the player and their lasers keep normal speed.
    const slowK = (window.POWERUP && window.POWERUP.slowActive()) ? 0.5 : 1;
    const wStep = step * slowK;

    // Boss trigger: round 10 with 220+ score, once per life, only outside endless.
    // Defensive: also skip if a boss is already on screen.
    if (!inEndless && !boss && !bossSpawned && !bossDefeated &&
        GAME.level >= 10 && GAME.score >= 220) {
      bossSpawned = true;
      try { console.log('[Boss] Spawning at score', GAME.score, 'level', GAME.level); } catch(_) {}
      spawnBoss();
    }
    updateBoss(now, step, slowK);

    // Spawn UFOs (paused while the boss is active so it has the stage).
    if (!GAME.over && !boss && now >= nextSpawn) {
      spawnUFO();
      const sm = levelMult();
      const cadence = Math.max(0.45, 1 / Math.sqrt(sm));
      nextSpawn = now + (UFO_MIN_INTERVAL + Math.random() * (UFO_MAX_INTERVAL - UFO_MIN_INTERVAL)) * cadence;
    }

    // Update bolts
    for (let i = bolts.length - 1; i >= 0; i--) {
      const b = bolts[i];
      b.x += b.vx * step; b.y += b.vy * step;
      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
      if (b.y < -40 || b.y > window.innerHeight + 40 ||
          b.x < -40 || b.x > window.innerWidth  + 40) {
        b.el.remove(); bolts.splice(i, 1);
      }
    }

    // Update UFOs
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      u.sway += 0.04 * wStep;
      if (u.isSine) {
        // Orbit baseX with a fat sine wave — amplitude set at spawn.
        u.x = u.baseX + Math.sin(u.sway) * u.swayAmp;
      } else {
        u.x += (u.vx + Math.sin(u.sway) * u.swayAmp) * wStep;
      }
      u.y += u.vy * wStep;
      // Shield knockback impulse — fades out over ~0.7s.
      if (u.kickVx || u.kickVy) {
        if (u.isSine) u.baseX += u.kickVx * wStep;
        else          u.x     += u.kickVx * wStep;
        u.y += u.kickVy * wStep;
        u.kickVx *= 0.92;
        u.kickVy *= 0.92;
        if (Math.abs(u.kickVx) < 0.05) u.kickVx = 0;
        if (Math.abs(u.kickVy) < 0.05) u.kickVy = 0;
      }
      u.el.style.left = u.x + 'px';
      u.el.style.top  = u.y + 'px';

      // Bolt collisions
      for (let j = bolts.length - 1; j >= 0; j--) {
        if (hitUFOvsBolt(u, bolts[j])) {
          const b = bolts[j];
          burst(b.x, b.y, { count: 8, hue: 'cool' });
          b.el.remove(); bolts.splice(j, 1);
          u.hp -= 1;
          if (u.hp <= 0) {
            const kx = u.x + u.w/2, ky = u.y + u.h/2;
            burst(kx, ky, { count: 22, hue: 'warm' });
            u.el.remove(); ufos.splice(i, 1);
            try { SFX.bigKill(); } catch (_) {}
            registerUFOKill(u, kx, ky);
            break;
          } else {
            u.el.classList.add('flash');
            setTimeout(() => u.el && u.el.classList.remove('flash'), 80);
          }
        }
      }
      if (!ufos[i]) continue;

      // Gun UFOs: shoot at player periodically
      if (u.isGun && !GAME.over) {
        const interval = Math.max(850, 1900 - (GAME.level * 90));
        if (now - u.lastShot > interval && u.y > -20 && u.y < window.innerHeight * 0.8) {
          u.lastShot = now;
          spawnEnemyBolt(u.x + u.w / 2, u.y + u.h * 0.95);
        }
      }
      // Rocket collision — shield bounces the UFO away (no kill, no damage); else game over.
      if (!GAME.over && hitRocketVsUFO(u)) {
        const kx = u.x + u.w/2, ky = u.y + u.h/2;
        if (window.POWERUP && window.POWERUP.shieldActive()) {
          const rc = rocketCenter();
          const dx = kx - rc.x, dy = ky - rc.y;
          const d  = Math.hypot(dx, dy) || 1;
          const speed = 16;
          u.kickVx = (dx / d) * speed;
          u.kickVy = (dy / d) * speed;
          // Nudge out of contact this frame so we don't re-trigger every tick.
          if (u.isSine) u.baseX += (dx / d) * 8;
          else          u.x     += (dx / d) * 8;
          u.y += (dy / d) * 8;
          burst(kx, ky, { count: 10, hue: 'cool' });
          if (window.__shieldFlash) window.__shieldFlash();
          u.el.classList.add('flash');
          setTimeout(() => u.el && u.el.classList.remove('flash'), 80);
          continue;
        }
        burst(kx, ky, { count: 30, hue: 'warm' });
        u.el.remove(); ufos.splice(i, 1);
        gameOver();
        continue;
      }

      // Offscreen cull (bottom) — UFO escaped, breaks the kill combo.
      if (u.y > window.innerHeight + 40) {
        u.el.remove(); ufos.splice(i, 1);
        breakCombo();
      }
    }

    // ---- Rocks (damaging asteroids) ----
    if (now > nextRock && GAME.level >= 2) {
      spawnRock();
      const interval = Math.max(2200, 5000 - GAME.level * 250);
      nextRock = now + interval + Math.random() * 1500;
    }
    for (let i = rocks.length - 1; i >= 0; i--) {
      const r = rocks[i];
      r.y += r.vy * step * slowK;
      r.rot += r.vrot * step;
      // Shield knockback impulse — gives rocks a sideways nudge that decays.
      if (r.kickVx || r.kickVy) {
        r.x += r.kickVx * step * slowK;
        r.y += r.kickVy * step * slowK;
        r.kickVx *= 0.93;
        r.kickVy *= 0.93;
        if (Math.abs(r.kickVx) < 0.05) r.kickVx = 0;
        if (Math.abs(r.kickVy) < 0.05) r.kickVy = 0;
        r.el.style.left = r.x + 'px';
      }
      r.el.style.top = r.y + 'px';
      r.el.style.transform = `rotate(${r.rot}deg)`;
      if (r.y > window.innerHeight + 60 || r.x < -120 || r.x > window.innerWidth + 120) {
        r.el.remove(); rocks.splice(i, 1);
        continue;
      }
      // Laser vs rock
      for (let j = bolts.length - 1; j >= 0; j--) {
        if (hitRockVsBolt(r, bolts[j])) {
          burst(r.x + r.w/2, r.y + r.h/2, { count: 10, hue: 'warm' });
          try { SFX.hit(); } catch (_) {}
          bolts[j].el.remove(); bolts.splice(j, 1);
          r.el.remove(); rocks.splice(i, 1);
          GAME.score += 1;
          if (scoreEl) scoreEl.textContent = String(GAME.score);
          break;
        }
      }
      if (!rocks[i]) continue;
      // Rocket vs rock — shield bounces the rock away; else damage the rocket.
      if (!GAME.over && hitRocketVsRock(r)) {
        const rcx = r.x + r.w/2, rcy = r.y + r.h/2;
        if (window.POWERUP && window.POWERUP.shieldActive()) {
          const rc = rocketCenter();
          const dx = rcx - rc.x, dy = rcy - rc.y;
          const d  = Math.hypot(dx, dy) || 1;
          const speed = 14;
          r.kickVx = (dx / d) * speed;
          r.kickVy = (dy / d) * speed;
          r.x += (dx / d) * 8;
          r.y += (dy / d) * 8;
          burst(rcx, rcy, { count: 8, hue: 'cool' });
          if (window.__shieldFlash) window.__shieldFlash();
          continue;
        }
        r.el.remove(); rocks.splice(i, 1);
        burst(rcx, rcy, { count: 14, hue: 'warm' });
        if (window.__damage) window.__damage(1);
      }
    }

    // ---- Comets (telegraphed dodge hazards) ----
    if (now > nextComet && GAME.level >= 5) {
      spawnComet();
      nextComet = now + 16000 + Math.random() * 10000;
    }
    for (let i = cometWarnings.length - 1; i >= 0; i--) {
      if (now > cometWarnings[i].until) {
        cometWarnings[i].el.remove();
        cometWarnings.splice(i, 1);
      }
    }
    for (let i = comets.length - 1; i >= 0; i--) {
      const c = comets[i];
      c.x += c.vx * step * slowK;
      c.y += c.vy * step * slowK;
      c.el.style.left = c.x + 'px';
      c.el.style.top  = c.y + 'px';
      if (c.x < -120 || c.x > window.innerWidth + 120 || c.y > window.innerHeight + 120) {
        c.el.remove(); comets.splice(i, 1);
        continue;
      }
      if (!GAME.over && hitRocketVsComet(c)) {
        const rc = rocketCenter();
        c.el.remove(); comets.splice(i, 1);
        burst(rc.x, rc.y, { count: 20, hue: 'warm' });
        if (window.__damage) window.__damage(1);
      }
    }

    // Update enemy bolts
    for (let i = enemyBolts.length - 1; i >= 0; i--) {
      const b = enemyBolts[i];
      b.x += b.vx * wStep; b.y += b.vy * wStep;
      b.el.style.left = b.x + 'px';
      b.el.style.top  = b.y + 'px';
      // Hit rocket
      if (!GAME.over && hitRocketVsEnemyBolt(b)) {
        const shielded = window.POWERUP && window.POWERUP.shieldActive();
        burst(b.x, b.y, { count: 10, hue: shielded ? 'cool' : 'warm' });
        b.el.remove(); enemyBolts.splice(i, 1);
        if (window.__damage) window.__damage(1);
        else damage(1);
        continue;
      }
      if (b.y < -40 || b.y > window.innerHeight + 40 ||
          b.x < -40 || b.x > window.innerWidth  + 40) {
        b.el.remove(); enemyBolts.splice(i, 1);
      }
    }

    // Auto-fire while space held
    if (firing && !GAME.over) {
      if (now - lastShot >= COOLDOWN) { fire(); lastShot = now; }
    }

    requestAnimationFrame(tick);
  }
  // Initialize level HUD + life meter
  setLevel(1);
  renderLife();

  requestAnimationFrame(tick);

  // ---- Input ----
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.key === ' ') {
      e.preventDefault();
      if (GAME.over) return;
      if (!firing) { fire(); lastShot = performance.now(); }
      firing = true;
    }
  }, { passive: false });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.key === ' ') firing = false;
  });
  window.addEventListener('blur', () => { firing = false; });

  // ================================================================
  // Coin pickups (falling) + kill quotes
  // ================================================================
  const pickupHost = document.getElementById('pickups');
  const quoteHost  = document.getElementById('quotes');

  // Pickup state
  const pickups = [];
  const PICKUP_MIN = 4500;   // ms between coin drops (much rarer than UFOs)
  const PICKUP_MAX = 9000;
  let nextPickup = performance.now() + 3000;

  function spawnPickup() {
    if (GAME.over || !pickupHost) return;
    const el = document.createElement('div');
    el.className = 'pickup';
    el.innerHTML = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <defs>
          <radialGradient id="pickG${Date.now()}${Math.random()}" cx="35%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#fff4b8"/>
            <stop offset="55%" stop-color="#ffc43d"/>
            <stop offset="100%" stop-color="#b07106"/>
          </radialGradient>
        </defs>
        <circle cx="12" cy="12" r="10" fill="#ffc43d" stroke="#7a4a00" stroke-width="1"/>
        <circle cx="12" cy="12" r="7" fill="none" stroke="#a76a00" stroke-width="0.8" opacity="0.7"/>
        <text x="12" y="16" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="800" fill="#7a4a00">5</text>
      </svg>`;
    const size = 34;
    const { min: minCoinX, range: coinRange } = spawnXRange(size);
    const x = minCoinX + Math.random() * coinRange;
    const y = -size;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    pickupHost.appendChild(el);
    pickups.push({
      el, x, y, w: size, h: size,
      vy: 1.6 + Math.random() * 1.2,
      vx: (Math.random() - 0.5) * 0.8,
      sway: Math.random() * Math.PI * 2,
    });
  }

  function hitRocketVsPickup(p) {
    const c = rocketCenter();
    const s = rocketSize();
    const pcx = p.x + p.w / 2, pcy = p.y + p.h / 2;
    const halfW = s.w * 0.50 + p.w * 0.55;
    const halfH = s.h * 0.50 + p.h * 0.55;
    const dx = c.x - pcx, dy = c.y - pcy;
    return (dx*dx) / (halfW*halfW) + (dy*dy) / (halfH*halfH) < 1;
  }

  // ---- Georgian kill quotes ----
  const KILL_QUOTES = [
    "გავანადგურე!!! 💥🔥",
    "შემდეგი... 👽👇",
    "აჰა შენ! 👊",
    "კიდევ ერთი!! 👾🔫",
    "ბუუუმ!!!!! 💣💥🎆",
    "ესეც ასე~ 😎✨",
    "შენი საქმე გათავებულია! ☠️",
    "ვერ გადამირჩებით!!!! 🚀😈",
    "ჰაერში ავწიე ! ! ! 🌪️🚀",
    "გავაქრე?! 🌟🌟",
    "აბა ჰე ✌️💨",
    "ზუსტად მიზანში!!! 🎯💯",
    "ხოდა ეგრე!! 💪😤",
    "მტვრად ვაქციე... 🌫️",
    "ათიანში!!!!! 🌟🥇",
  ];

  // Avoid repeating the same quote twice in a row
  let lastQuoteIdx = -1;
  function pickQuote() {
    let i;
    do { i = Math.floor(Math.random() * KILL_QUOTES.length); }
    while (i === lastQuoteIdx && KILL_QUOTES.length > 1);
    lastQuoteIdx = i;
    return KILL_QUOTES[i];
  }

  function showKillQuote(x, y) {
    if (!quoteHost) return;
    const el = document.createElement('div');
    el.className = 'quote';
    el.textContent = pickQuote();
    // Anchor above the kill site, nudged into the viewport if near edges.
    const px = Math.max(120, Math.min(window.innerWidth - 120, x));
    const py = Math.max(60,  Math.min(window.innerHeight - 60, y - 44));
    el.style.left = px + 'px';
    el.style.top  = py + 'px';
    quoteHost.appendChild(el);

    // Animate: pop in, drift up, fade out.
    const DUR  = 1500;
    const start = performance.now();
    const rot  = (Math.random() - 0.5) * 8; // tiny tilt for personality
    function step(now) {
      const t = Math.min(1, (now - start) / DUR);
      // Pop + drift
      const scale = t < 0.15 ? (0.4 + (t / 0.15) * 0.7) : (1.1 - t * 0.1);
      const rise  = -40 * t;
      const op    = t < 0.1 ? t / 0.1 : (t > 0.75 ? (1 - t) / 0.25 : 1);
      el.style.transform =
        `translate(-50%, calc(-50% + ${rise}px)) rotate(${rot}deg) scale(${scale})`;
      el.style.opacity = String(op);
      if (t < 1) requestAnimationFrame(step);
      else el.remove();
    }
    requestAnimationFrame(step);
  }

  // Patch into the kill flow: we already bump score + burst in the UFO tick,
  // so we just hook an additional quote display + set up pickups loop via
  // a second rAF runner dedicated to falling coins.
  let lastPickupTs = 0;
  function pickupTick(now) {
    let step = 1;
    if (lastPickupTs) {
      step = (now - lastPickupTs) / (1000 / 60);
      if (step < 0.2) step = 0.2;
      if (step > 3)   step = 3;
    }
    lastPickupTs = now;

    if (!GAME.over && now >= nextPickup) {
      spawnPickup();
      nextPickup = now + PICKUP_MIN + Math.random() * (PICKUP_MAX - PICKUP_MIN);
    }
    const slowK = (window.POWERUP && window.POWERUP.slowActive()) ? 0.5 : 1;
    const wStep = step * slowK;
    const magnet = !!(window.POWERUP && window.POWERUP.magnetActive());
    for (let i = pickups.length - 1; i >= 0; i--) {
      const p = pickups[i];
      if (magnet) {
        // Pull the coin toward the rocket — overrides natural fall.
        const c = rocketCenter();
        const dx = c.x - (p.x + p.w / 2);
        const dy = c.y - (p.y + p.h / 2);
        const d  = Math.hypot(dx, dy) || 1;
        const pull = 7.5;
        p.x += (dx / d) * pull * step;
        p.y += (dy / d) * pull * step;
      } else {
        p.sway += 0.05 * wStep;
        p.x += (p.vx + Math.sin(p.sway) * 0.8) * wStep;
        p.y += p.vy * wStep;
      }
      p.el.style.left = p.x + 'px';
      p.el.style.top  = p.y + 'px';

      if (!GAME.over && hitRocketVsPickup(p)) {
        // Award +5, fly a coin to the HUD, sparkle burst
        const cx = p.x + p.w / 2, cy = p.y + p.h / 2;
        burst(cx, cy, { count: 14, hue: 'warm' });
        try { SFX.coin(); } catch (_) {}
        GAME.score += 5;
        // Coin streak: 5 in a row awards a bonus and resets.
        coinStreak++;
        if (coinStreak >= COIN_STREAK_THRESHOLD) {
          GAME.score += COIN_STREAK_BONUS;
          showBonusBanner('+' + COIN_STREAK_BONUS + ' ქულა');
          coinStreak = 0;
        }
        updateStreakHud();
        if (scoreEl) {
          scoreEl.textContent = String(GAME.score);
          scoreEl.classList.remove('bump');
          void scoreEl.offsetWidth;
          scoreEl.classList.add('bump');
          setTimeout(() => scoreEl.classList.remove('bump'), 200);
        }
        flyCoin(cx, cy);
        maybeLevelUp();
        p.el.remove(); pickups.splice(i, 1);
        continue;
      }
      if (p.y > window.innerHeight + 40) {
        p.el.remove(); pickups.splice(i, 1);
        breakStreak();
      }
    }
    requestAnimationFrame(pickupTick);
  }
  requestAnimationFrame(pickupTick);

  // Also clear pickups on reset
  const _origReset = reset;
  // eslint-disable-next-line no-func-assign
  reset = function () {
    pickups.forEach(p => p.el.remove()); pickups.length = 0;
    if (quoteHost) quoteHost.innerHTML = '';
    nextPickup = performance.now() + 2500;
    _origReset();
  };

  // Expose a kill-quote hook and call it from the UFO destroy path by
  // monkey-patching flyCoin? Simpler: observe score changes on kill.
  // We instead wire directly — patch the game's tick via a MutationObserver
  // on the score element is overkill. Hook here:
  window.__onUFOKill = (kx, ky) => showKillQuote(kx, ky);

  // ---- Thrust sound on movement (throttled) ----
  let lastThrust = 0;
  function maybeThrust() {
    const now = performance.now();
    if (now - lastThrust < 320) return;
    lastThrust = now;
    try { SFX.thrust(); } catch (_) {}
  }
  // Fire thrust sound on key-driven movement and touch-target movement
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'ArrowUp' || k === 'ArrowDown' || k === 'ArrowLeft' || k === 'ArrowRight' ||
        k === 'w' || k === 'W' || k === 'a' || k === 'A' ||
        k === 's' || k === 'S' || k === 'd' || k === 'D') {
      if (!e.repeat) maybeThrust();
    }
  });
  // For touch-to-move: detect when a new target is set
  let _lastTargetCheck = null;
  setInterval(() => {
    const T = window.ROCKET && window.ROCKET.target;
    if (T && !_lastTargetCheck) maybeThrust();
    _lastTargetCheck = T;
  }, 120);
})();

/* ------------------------------------------------------------------
   Mobile touch controls — 1:1 DRAG.
   Finger movement translates directly into rocket movement: no joystick
   origin to find, no lurching toward a tap point. Fire button dispatches
   synthetic Space keydown/keyup so the existing combat code handles it.
-------------------------------------------------------------------*/
(function () {
  const stick    = document.getElementById('stick');
  const fireBtn  = document.getElementById('fireBtn');
  const hint     = document.getElementById('hint');
  if (!stick || !fireBtn) return;

  const R = window.ROCKET;
  if (!R) return;

  let pointerId = null;
  let lastX = 0, lastY = 0;
  const SENSITIVITY = 1.25; // tune: higher = faster rocket per finger move

  function applyDelta(clientX, clientY) {
    const dx = (clientX - lastX) * SENSITIVITY;
    const dy = (clientY - lastY) * SENSITIVITY;
    lastX = clientX;
    lastY = clientY;
    const margin = 60;
    const maxX = window.innerWidth  / 2 - margin;
    const maxY = window.innerHeight / 2 - margin;
    R.x = Math.max(-maxX, Math.min(maxX, (R.x || 0) + dx));
    R.y = Math.max(-maxY, Math.min(maxY, (R.y || 0) + dy));
    if (R.vx !== undefined) R.vx = 0;
    if (R.vy !== undefined) R.vy = 0;
  }

  function onDown(e) {
    if (pointerId !== null) return;
    pointerId = e.pointerId;
    try { stick.setPointerCapture(pointerId); } catch (_) {}
    lastX = e.clientX;
    lastY = e.clientY;
    R.target = null;
    if (hint) hint.classList.add('fade');
    e.preventDefault();
  }
  function onMove(e) {
    if (e.pointerId !== pointerId) return;
    applyDelta(e.clientX, e.clientY);
    e.preventDefault();
  }
  function onUp(e) {
    if (e.pointerId !== pointerId) return;
    try { stick.releasePointerCapture(pointerId); } catch (_) {}
    pointerId = null;
  }

  stick.addEventListener('pointerdown',   onDown);
  stick.addEventListener('pointermove',   onMove);
  stick.addEventListener('pointerup',     onUp);
  stick.addEventListener('pointercancel', onUp);
  stick.addEventListener('lostpointercapture', (e) => {
    if (e.pointerId === pointerId) pointerId = null;
  });
  window.addEventListener('pointerup',     onUp, true);
  window.addEventListener('pointercancel', onUp, true);
  window.addEventListener('pointermove',   (e) => {
    if (pointerId !== null && e.pointerId === pointerId) {
      applyDelta(e.clientX, e.clientY);
    }
  }, true);

  // Fire button — synthetic Space events
  function fireDown(ev) {
    ev.preventDefault(); ev.stopPropagation();
    fireBtn.classList.add('pressed');
    window.dispatchEvent(new KeyboardEvent('keydown', { key: ' ', code: 'Space', bubbles: true }));
  }
  function fireUp(ev) {
    if (ev) { ev.preventDefault(); ev.stopPropagation && ev.stopPropagation(); }
    fireBtn.classList.remove('pressed');
    window.dispatchEvent(new KeyboardEvent('keyup',   { key: ' ', code: 'Space', bubbles: true }));
  }
  fireBtn.addEventListener('pointerdown',   fireDown);
  fireBtn.addEventListener('pointerup',     fireUp);
  fireBtn.addEventListener('pointercancel', fireUp);
  fireBtn.addEventListener('pointerleave',  () => fireBtn.classList.contains('pressed') && fireUp());

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { fireUp(); pointerId = null; }
  });
  window.addEventListener('blur', () => { fireUp(); pointerId = null; });

  document.addEventListener('gesturestart',  (e) => e.preventDefault());
  document.addEventListener('touchstart',    (e) => {
    // Allow steering stick, fire button, and any victory-screen controls
    if (e.target.closest('.stick, .fire-btn, .victory-btn, #victoryScreen')) return;
    e.preventDefault();
  }, { passive: false });
})();
</script>

      let r = Math.random() * total;

      return pool[0][0];

              <stop offset="100%" stop-color="#3a6a9a"/>
            </radialGradient>
          </defs>
          <circle cx="21" cy="21" r="16" fill="url(#slG_${uid})" stroke="#1a3a5c" stroke-width="1.6"/>
          <circle cx="21" cy="21" r="13" fill="none" stroke="rgba(26,58,92,0.45)" stroke-width="0.8"/>
          <line x1="21" y1="8"  x2="21" y2="11" stroke="#1a3a5c" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="21" y1="31" x2="21" y2="34" stroke="#1a3a5c" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="8"  y1="21" x2="11" y2="21" stroke="#1a3a5c" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="31" y1="21" x2="34" y2="21" stroke="#1a3a5c" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="21" y1="21" x2="21" y2="12" stroke="#1a2240" stroke-width="2"   stroke-linecap="round"/>
          <line x1="21" y1="21" x2="28" y2="24" stroke="#d63d4a" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="21" cy="21" r="1.8" fill="#1a2240"/>
        </svg>`;
    }
    return '';
  }

  function spawnPowerup() {
    const kind = pickKind();
    if (!kind) return;
    const el = document.createElement('div');
    el.className = 'powerup ' + kind;
    el.innerHTML = svgFor(kind);
    const size = 46;
    // Edge-buffer spawn zone — keep the powerup in the rocket's reach.
    // Inlined here because combat-module's spawnXRange() isn't in scope.
    const EDGE_BUFFER_PU = 70;
    const halfPU = size / 2;
    const minPUX = EDGE_BUFFER_PU - halfPU;
    const maxPUX = window.innerWidth - EDGE_BUFFER_PU - halfPU;
    const x = minPUX + Math.random() * Math.max(20, maxPUX - minPUX);
    const y = -size;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    host.appendChild(el);
    powerups.push({ el, x, y, w: size, h: size, kind, vy: 1.4 + Math.random() * 0.8, sway: Math.random() * 6.28 });
  }

  function rocketCenter() {
    const R = window.ROCKET || { x: 0, y: 0 };
    return { x: window.innerWidth / 2 + R.x, y: window.innerHeight / 2 + R.y };
  }
  function hitRocket(p) {
    const c = rocketCenter();
    // Ellipse sized to the rocket silhouette (wrap is min(110px, 9vw) × 2.2).
    // A circle around the wrap's center couldn't reach the nose.
    const w = Math.min(110, window.innerWidth * 0.09);
    const h = w * 2.2;
    const dx = c.x - p.x, dy = c.y - p.y;
    const rx = w * 0.55 + 22;
    const ry = h * 0.50 + 22;
    return (dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) < 1;
  }

  function activateShield() {
    PU.shieldUntil = performance.now() + DUR_SHIELD * 1000;
    if (halo) halo.style.display = '';
    if (shieldBadge) shieldBadge.classList.add('on');
    if (shieldBar)   shieldBar.style.width = '100%';
    try { window.SFX && SFX.shieldPick(); } catch(_) {}
  }
  function activateDouble() {
    PU.doubleUntil = performance.now() + DUR_DOUBLE * 1000;
    dsBadge.classList.add('on');
    if (dsBar) dsBar.style.width = '100%';
    try { window.SFX && SFX.doubleShotPick(); } catch(_) {}
  }
  function activateMagnet() {
    PU.magnetUntil = performance.now() + DUR_MAGNET * 1000;
    if (magnetBadge) magnetBadge.classList.add('on');
    if (magnetBar) magnetBar.style.width = '100%';
    try { window.SFX && SFX.doubleShotPick(); } catch(_) {}
  }
  function activateSlow() {
    PU.slowUntil = performance.now() + DUR_SLOW * 1000;
    if (slowBadge) slowBadge.classList.add('on');
    if (slowBar) slowBar.style.width = '100%';
    try { window.SFX && SFX.shieldPick(); } catch(_) {}
  }
  function activateBomb() {
    if (window.__killAllUFOs) window.__killAllUFOs();
    const fx = document.getElementById('fx');
    if (fx) {
      const flash = document.createElement('div');
      flash.className = 'bigflash';
      fx.appendChild(flash);
      setTimeout(() => flash.remove(), 700);
    }
    const stage = document.querySelector('.stage');
    if (stage) {
      stage.classList.add('shake');
      setTimeout(() => stage.classList.remove('shake'), 700);
    }
  }
  function activateHeal() {
    if (window.__heal) window.__heal(1);
    try { window.SFX && SFX.shieldPick(); } catch(_) {}
  }

  function activate(kind) {
    switch (kind) {
      case 'shield': return activateShield();
      case 'double': return activateDouble();
      case 'magnet': return activateMagnet();
      case 'slow':   return activateSlow();
      case 'bomb':   return activateBomb();
      case 'heal':   return activateHeal();
    }
  }

  // Make damage() respect shield — patch window.__damage
  const origDamage = window.__damage;
  window.__damage = function (n) {
    if (PU.shieldActive()) {
      // Absorb hit with a flash on the halo
      if (halo) {
        halo.style.transition = 'filter .12s';
        halo.style.filter = 'brightness(2) saturate(1.5)';
        setTimeout(() => halo && (halo.style.filter = ''), 140);
      }
      return;
    }
    if (typeof origDamage === 'function') origDamage(n);
  };

  let lastTs = 0;
  function tick(now) {
    let step = 1;
    if (lastTs) step = Math.min(3, Math.max(0.2, (now - lastTs) / (1000/60)));
    lastTs = now;

    // Round-start bonus: on any level change, pull the next spawn in to ≤2s.
    if (window.GAME && window.GAME.level !== lastTrackedLevel) {
      lastTrackedLevel = window.GAME.level;
      if (shouldSpawn()) nextSpawn = Math.min(nextSpawn, performance.now() + 2000);
    }

    if (shouldSpawn() && now >= nextSpawn) {
      spawnPowerup();
      nextSpawn = now + 8000 + Math.random() * 6000; // 8-14 seconds
    }

    // Slow-motion also affects falling powerup items
    const slowK = PU.slowActive() ? 0.5 : 1;
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.sway += 0.05 * step * slowK;
      p.x += Math.sin(p.sway) * 0.6 * step * slowK;
      p.y += p.vy * step * slowK;
      p.el.style.left = p.x + 'px';
      p.el.style.top  = p.y + 'px';
      if (hitRocket(p)) {
        activate(p.kind);
        p.el.remove(); powerups.splice(i, 1);
        continue;
      }
      if (p.y > window.innerHeight + 60) {
        p.el.remove(); powerups.splice(i, 1);
      }
    }

    // Shield halo follows the rocket; countdown badge lives in the HUD stack.
    if (PU.shieldActive()) {
      const remain = (PU.shieldUntil - now) / 1000;
      const c = rocketCenter();
      if (halo) {
        halo.style.left = c.x + 'px';
        halo.style.top  = c.y + 'px';
      }
      if (shieldBadge && !shieldBadge.classList.contains('on')) shieldBadge.classList.add('on');
      if (shieldTime) shieldTime.textContent = Math.max(0, Math.ceil(remain));
      if (shieldBar)  shieldBar.style.width = Math.max(0, Math.min(100, (remain / DUR_SHIELD) * 100)) + '%';
    } else {
      if (halo && halo.style.display !== 'none') halo.style.display = 'none';
      if (shieldBadge && shieldBadge.classList.contains('on')) shieldBadge.classList.remove('on');
    }

    // Double-shot badge timer
    if (PU.doubleActive()) {
      const remain = (PU.doubleUntil - now) / 1000;
      if (dsTime) dsTime.textContent = Math.max(0, Math.ceil(remain));
      if (dsBar)  dsBar.style.width = Math.max(0, Math.min(100, (remain / DUR_DOUBLE) * 100)) + '%';
    } else if (dsBadge.classList.contains('on')) {
      dsBadge.classList.remove('on');
    }

    // Magnet badge timer
    if (PU.magnetActive()) {
      const remain = (PU.magnetUntil - now) / 1000;
      if (magnetTime) magnetTime.textContent = Math.max(0, Math.ceil(remain));
      if (magnetBar)  magnetBar.style.width = Math.max(0, Math.min(100, (remain / DUR_MAGNET) * 100)) + '%';
    } else if (magnetBadge && magnetBadge.classList.contains('on')) {
      magnetBadge.classList.remove('on');
    }

    // Slow badge timer
    if (PU.slowActive()) {
      const remain = (PU.slowUntil - now) / 1000;
      if (slowTime) slowTime.textContent = Math.max(0, Math.ceil(remain));
      if (slowBar)  slowBar.style.width = Math.max(0, Math.min(100, (remain / DUR_SLOW) * 100)) + '%';
    } else if (slowBadge && slowBadge.classList.contains('on')) {
      slowBadge.classList.remove('on');
    }

    // Clear powerups on game over
    if (window.GAME && window.GAME.over) {
      powerups.forEach(p => p.el.remove()); powerups.length = 0;
      PU.shieldUntil = 0; PU.doubleUntil = 0; PU.magnetUntil = 0; PU.slowUntil = 0;
      if (halo) halo.style.display = 'none';
      if (shieldBadge) shieldBadge.classList.remove('on');
      dsBadge.classList.remove('on');
      if (magnetBadge) magnetBadge.classList.remove('on');
      if (slowBadge)   slowBadge.classList.remove('on');
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

// --- Double-shot: when active, spawn a second parallel laser from the rocket ---
(function () {
  // Monkey-patch by listening to the existing bolts host: when a new .laser
  // is added, mirror it offset slightly to the side.
  const laserHost = document.getElementById('lasers');
  if (!laserHost) return;
  const obs = new MutationObserver((muts) => {
    if (!window.POWERUP || !window.POWERUP.doubleActive()) return;
    for (const m of muts) {
      for (const n of m.addedNodes) {
        if (!(n instanceof HTMLElement) || !n.classList.contains('laser')) continue;
        if (n.dataset._ds === 'twin') continue;
        // Clone and offset: original becomes left stream, clone is right stream
        const OFFSET = 14;
        const origLeft = parseFloat(n.style.left) || 0;
        n.style.left = (origLeft - OFFSET) + 'px';
        const twin = n.cloneNode(true);
        twin.dataset._ds = 'twin';
        twin.style.left = (origLeft + OFFSET) + 'px';
        laserHost.appendChild(twin);
        // Keep twin in sync with original by re-positioning each frame via
        // a tracker — but original is moved by the bolts update loop using
        // pushed state, not DOM. Simpler: re-derive via each frame read of
        // the original's style.
        const id = setInterval(() => {
          if (!n.isConnected) { twin.remove(); clearInterval(id); return; }
          const l = parseFloat(n.style.left) || 0;
          const t = parseFloat(n.style.top)  || 0;
          twin.style.left = (l + OFFSET * 2) + 'px';
          twin.style.top  = t + 'px';
          twin.style.transform = n.style.transform;
        }, 16);
      }
    }
  });
  obs.observe(laserHost, { childList: true });
})();
</script>

<script>
(function () {
  const SUPABASE_URL  = "https://zljpduoilroacexerygf.supabase.co";
  const SUPABASE_KEY  = "sb_publishable_gAX1c4KOMkiQCUy8aZINzQ_YQjipjds";

  const LS_NICK     = 'rocketgame_nickname';
  const LS_BEST     = 'rocketgame_personal_best';

  function getNick()   { return localStorage.getItem(LS_NICK) || ''; }
  function setNick(n)  { localStorage.setItem(LS_NICK, n); }
  function getBest()   { return parseInt(localStorage.getItem(LS_BEST) || '0', 10); }
  function setBest(s)  { localStorage.setItem(LS_BEST, String(s)); }

  async function postScore(nickname, score) {
    if (!SUPABASE_URL || !SUPABASE_URL.startsWith('http')) return false;
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/leaderboard', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ nickname: String(nickname).slice(0, 24), score: Math.floor(score) }),
      });
      return res.ok;
    } catch (_) { return false; }
  }

  async function fetchTop10() {
    if (!SUPABASE_URL || !SUPABASE_URL.startsWith('http')) return [];
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/leaderboard?select=nickname,score,created_at&order=score.desc&limit=10', {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
        },
      });
      if (!res.ok) return [];
      return await res.json();
    } catch (_) { return []; }
  }

  function ensureNicknameOverlay() {
    if (document.getElementById('nickOverlay')) return;
    const wrap = document.createElement('div');
    wrap.id = 'nickOverlay';
    wrap.innerHTML = `
      <div class="nick-card">
        <h2>გაუმარჯოს 🚀</h2>
        <p>ჩაწერე შენი სახელი</p>
        <input id="nickInput" maxlength="20" placeholder="მაგ: მალხაზი" autocomplete="off" />
        <button id="nickSaveBtn" type="button">დადასტურება</button>
      </div>`;
    document.body.appendChild(wrap);
    const input = wrap.querySelector('#nickInput');
    const btn   = wrap.querySelector('#nickSaveBtn');
    input.value = getNick();
    function commit() {
      const v = input.value.trim();
      if (v.length < 2) { input.focus(); return; }
      setNick(v);
      wrap.remove();
      resumeGameAfterNickname();
    }
    btn.addEventListener('click', commit);
    btn.addEventListener('pointerup', commit);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') commit(); });
    setTimeout(() => input.focus(), 100);
  }

  function showLeaderboard() {
    const existing = document.getElementById('lbOverlay');
    if (existing) existing.remove();
    const wrap = document.createElement('div');
    wrap.id = 'lbOverlay';
    const best = getBest();
    const myNick = getNick() || '—';
    wrap.innerHTML = `
      <div class="lb-card">
        <button class="lb-close" id="lbCloseBtn" aria-label="დახურვა">×</button>
        <h2>ლიდერბორდი</h2>
        <div class="lb-personal">
          <div><span class="lb-label">პირადი რეკორდი:</span> <strong>${best}</strong></div>
          <button class="lb-edit" id="lbEditBtn" type="button">სახელის შეცვლა</button>
        </div>
        <h3>ტოპ 10</h3>
        <ol class="lb-list" id="lbList"><li class="lb-loading">იტვირთება...</li></ol>
      </div>`;
    document.body.appendChild(wrap);
    function close() { wrap.remove(); }
    wrap.querySelector('#lbCloseBtn').addEventListener('click', close);
    wrap.querySelector('#lbCloseBtn').addEventListener('pointerup', close);
    wrap.querySelector('#lbEditBtn').addEventListener('click', () => {
      close();
      localStorage.removeItem(LS_NICK);
      pauseGameForNickname();
      ensureNicknameOverlay();
    });
    fetchTop10().then(rows => {
      const ol = wrap.querySelector('#lbList');
      if (!rows.length) {
        ol.innerHTML = '<li class="lb-empty">ჯერ ვერავინ ჩაწერა ქულა</li>';
        return;
      }
      ol.innerHTML = rows.map((r, i) =>
        `<li><span class="lb-rank">${i+1}</span>
             <span class="lb-name">${escapeHtml(r.nickname)}</span>
             <span class="lb-score">${r.score}</span></li>`).join('');
    });
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  function ensureTrophyBtn() {
    if (document.getElementById('lbBtn')) return;
    const b = document.createElement('button');
    b.id = 'lbBtn';
    b.type = 'button';
    b.setAttribute('aria-label', 'ლიდერბორდი');
    b.innerHTML = '🏆';
    b.addEventListener('click', showLeaderboard);
    b.addEventListener('pointerup', (e) => { e.preventDefault(); showLeaderboard(); });
    document.body.appendChild(b);
  }

  let lastSubmittedScore = -1;
  async function maybeSubmit() {
    if (!window.GAME) return;
    const s = window.GAME.score | 0;
    if (s <= 0 || s === lastSubmittedScore) return;
    lastSubmittedScore = s;
    if (s > getBest()) setBest(s);
    const nick = getNick();
    if (nick && s >= 20) postScore(nick, s);
  }

  function watchGameState() {
    let wasOver = false;
    setInterval(() => {
      if (!window.GAME) return;
      const isOver = !!window.GAME.over;
      if (isOver && !wasOver) maybeSubmit();
      wasOver = isOver;
    }, 500);
  }

  // --- Pause/resume game while nickname overlay is shown ---
  function pauseGameForNickname() {
    if (window.GAME) window.GAME.over = true;
    document.body.classList.add('nick-paused');
  }
  function resumeGameAfterNickname() {
    document.body.classList.remove('nick-paused');
    if (window.GAME) window.GAME.over = false;
    // Reset spawn timers so things don't all spawn at once after pause
    if (window.__resetSpawnTimers) window.__resetSpawnTimers();
  }

  function boot() {
    ensureTrophyBtn();
    if (!getNick()) {
      pauseGameForNickname();
      ensureNicknameOverlay();
    }
    watchGameState();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
